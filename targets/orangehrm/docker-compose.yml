version: '3.8'

# NoUI Connector Lab — OrangeHRM Target Stack
# OrangeHRM 5.6 + MariaDB 10.11
#
# Usage:
#   docker compose up -d
#   docker compose logs -f orangehrm   # watch for ready state (~2 min)
#
# First run: complete browser installer at http://localhost:8080
# DB credentials: orangehrm / orangehrm (port 3306 exposed for direct access)

services:
  orangehrm-db:
    image: mariadb:10.11
    container_name: orangehrm-db
    environment:
      MYSQL_ROOT_PASSWORD: noui_root
      MYSQL_DATABASE: orangehrm
      MYSQL_USER: orangehrm
      MYSQL_PASSWORD: orangehrm
    ports:
      - "3306:3306"
    volumes:
      - orangehrm-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  orangehrm:
    image: orangehrm/orangehrm:5.6
    container_name: orangehrm-app
    depends_on:
      orangehrm-db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      OHM_DB_HOST: orangehrm-db
      OHM_DB_PORT: 3306
      OHM_DB_NAME: orangehrm
      OHM_DB_USER: orangehrm
      OHM_DB_PASSWORD: orangehrm
    volumes:
      - orangehrm-app-data:/var/www/html/lib/confs
    restart: unless-stopped

volumes:
  orangehrm-db-data:
    driver: local
  orangehrm-app-data:
    driver: local
