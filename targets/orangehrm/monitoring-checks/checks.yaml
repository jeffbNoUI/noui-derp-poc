# OrangeHRM Monitoring Checks — NoUI Connector Lab
# These checks are OrangeHRM-specific configurations of the generic monitoring engine.
# The generic check logic lives in connector/monitor/.
#
# Each check maps a NoUI monitoring pattern to OrangeHRM schema specifics.

version: "1.0"
target: orangehrm
database: mariadb

checks:

  - id: CHK-OHR-001
    name: Payroll Run Gap Detection
    concept_tag: payroll-run
    severity: HIGH
    description: >
      Expected payroll runs are missing for one or more months.
      In a healthy payroll cycle, at least one run should exist per calendar month.
    query: |
      SELECT
        DATE_FORMAT(pay_period_start, '%Y-%m') AS month,
        COUNT(*) AS run_count
      FROM ohrm_payroll_export
      WHERE pay_period_start >= DATE_SUB(CURDATE(), INTERVAL 3 YEAR)
      GROUP BY DATE_FORMAT(pay_period_start, '%Y-%m')
      ORDER BY month
    detection_logic: >
      Compare consecutive months. Any month with 0 runs is an anomaly.
      Months with run_count < baseline_median - 2 are warnings.
    baseline_field: run_count
    expected_min_per_month: 1
    derp_analog: "Missing payroll posting periods; contribution gap detection"

  - id: CHK-OHR-002
    name: Salary History Continuity
    concept_tag: salary-history
    severity: MEDIUM
    description: >
      Active employees should have unbroken salary history records.
      A gap of more than 35 days between consecutive salary records indicates
      a missing pay period.
    query: |
      SELECT
        a.emp_number,
        a.effective_date AS period_end,
        b.effective_date AS next_period_start,
        DATEDIFF(b.effective_date, a.effective_date) AS gap_days
      FROM hs_hr_employee_salary a
      JOIN hs_hr_employee_salary b
        ON a.emp_number = b.emp_number
        AND b.effective_date = (
          SELECT MIN(effective_date)
          FROM hs_hr_employee_salary
          WHERE emp_number = a.emp_number
            AND effective_date > a.effective_date
        )
      WHERE DATEDIFF(b.effective_date, a.effective_date) > 35
    detection_logic: >
      Each row returned is an anomaly. gap_days > 35 means a pay period was skipped.
    baseline_field: gap_days
    expected_max_gap_days: 35
    derp_analog: "AMS window integrity; salary history gaps affect AMS calculation"

  - id: CHK-OHR-003
    name: Negative Leave Balance
    concept_tag: leave-balance
    severity: MEDIUM
    description: >
      Employee leave balances should not go negative under normal accrual rules.
      Negative balances indicate either a data entry error or an unapplied accrual.
    query: |
      SELECT
        s.emp_number,
        e.emp_firstname,
        e.emp_lastname,
        s.leave_type_id,
        s.balance
      FROM ohrm_leave_summary s
      JOIN hs_hr_employee e ON s.emp_number = e.emp_number
      WHERE s.balance < 0
        AND e.emp_status = 'Active'
    detection_logic: >
      Each row returned is a confirmed anomaly. No threshold — any negative is a finding.
    baseline_field: balance
    expected_min: 0
    derp_analog: "Leave payout calculation; negative balance would produce incorrect AMS boost"

  - id: CHK-OHR-004
    name: Termination Record Consistency
    concept_tag: member-identity
    severity: HIGH
    description: >
      Employees with 'Terminated' status should have a corresponding termination record.
      Missing termination records indicate incomplete processing.
    query: |
      SELECT
        e.emp_number,
        e.emp_firstname,
        e.emp_lastname,
        e.emp_status
      FROM hs_hr_employee e
      LEFT JOIN ohrm_employee_termination t ON e.emp_number = t.emp_number
      WHERE e.emp_status = 'Terminated'
        AND t.id IS NULL
    detection_logic: >
      Each row returned is a confirmed anomaly (terminated employee, no termination record).
    derp_analog: "Separation date integrity; affects refund eligibility and 90-day wait"

  - id: CHK-OHR-005
    name: Payroll Headcount Drift
    concept_tag: payroll-run
    severity: MEDIUM
    description: >
      The employee count in payroll runs should not drop more than 5% month-over-month
      without a corresponding increase in termination records.
    query: |
      SELECT
        DATE_FORMAT(pay_period_start, '%Y-%m') AS month,
        employee_count,
        LAG(employee_count) OVER (ORDER BY pay_period_start) AS prev_count,
        ROUND(
          (employee_count - LAG(employee_count) OVER (ORDER BY pay_period_start))
          / LAG(employee_count) OVER (ORDER BY pay_period_start) * 100, 2
        ) AS pct_change
      FROM ohrm_payroll_export
      ORDER BY pay_period_start
    detection_logic: >
      Months where pct_change < -5.0 are anomalies. Cross-reference with
      termination records for that month to determine if change is explained.
    baseline_field: pct_change
    expected_min_pct_change: -5.0
    derp_analog: "Employer reporting headcount validation; matches COPERA payroll confidence score concept"

  - id: CHK-OHR-006
    name: Invalid Hire Date
    concept_tag: member-identity
    severity: HIGH
    description: >
      Employee hire dates (joined_date) should not be in the future.
      Future-dated hires indicate data entry errors.
    query: |
      SELECT
        emp_number,
        emp_firstname,
        emp_lastname,
        joined_date,
        DATEDIFF(joined_date, CURDATE()) AS days_in_future
      FROM hs_hr_employee
      WHERE joined_date > CURDATE()
        AND emp_status = 'Active'
    detection_logic: >
      Each row returned is a confirmed anomaly.
    derp_analog: "Hire date validity; affects tier determination and service credit calculation"
