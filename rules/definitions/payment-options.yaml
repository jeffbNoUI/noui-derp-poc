# ===========================================================================
# NoUI DERP POC — Payment Options & Spousal Consent Rules
# ===========================================================================
# Category 5: Payment option selection determines lifetime benefit structure.
# J&S options reduce benefit in exchange for survivor protection.
# All elections are irrevocable.
# Evaluation order: 5
# ===========================================================================

file_metadata:
  category: payment_options
  description: "Maximum benefit, J&S options, spousal consent, and beneficiary rules."
  evaluation_order: 5
  rule_count: 7
  governing_authority: "RMC §18-391 through §18-430.7"
  schema_version: "1.0"

rules:

  # =========================================================================
  # RULE-PAY-MAXIMUM
  # =========================================================================
  - rule_id: RULE-PAY-MAXIMUM
    rule_name: "Maximum Benefit (Single Life Annuity)"
    category: payment_options
    description: >
      The maximum benefit is the full calculated monthly amount with no
      survivor protection. Payments for member's lifetime only; all cease
      upon death.
    tier_applicability: [1, 2, 3]
    conditions: []
    formula:
      expression: "maximumBenefit = finalMonthlyBenefit (after reduction if applicable, after DRO if applicable)"
      variables:
        - name: finalMonthlyBenefit
          source: "rule.RULE-REDUCTION-APPLY.output.reducedMonthlyBenefit or RULE-BENEFIT-T*.output"
          description: "Benefit after any early retirement reduction"
    result:
      type: calculation
      output_fields:
        - name: maximumMonthlyBenefit
          type: decimal
          format: monetary
          description: "Single life annuity amount — no survivor benefit"
    source_reference:
      document: "RMC"
      section: "§18-410(a)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-REDUCTION-APPLY]
    assumptions: []
    test_cases:
      - id: TC-PAY-MAX-01
        description: "Martinez — maximum = $6,117.68 (Rule of 75, no reduction)"
        type: happy_path
        inputs: { finalMonthlyBenefit: "6117.68" }
        expected: { maximumMonthlyBenefit: "6117.68" }
      - id: TC-PAY-MAX-02
        description: "Kim — maximum = $1,633.07 (after 30% reduction)"
        type: happy_path
        inputs: { finalMonthlyBenefit: "1633.07" }
        expected: { maximumMonthlyBenefit: "1633.07" }
      - id: TC-PAY-MAX-03
        description: "Washington — maximum = $1,198.03 (after 12% reduction)"
        type: happy_path
        inputs: { finalMonthlyBenefit: "1198.03" }
        expected: { maximumMonthlyBenefit: "1198.03" }
      - id: TC-PAY-MAX-04
        description: "Case 4 — maximum after DRO split"
        type: happy_path
        inputs: { finalMonthlyBenefit: "4564.44" }
        expected: { maximumMonthlyBenefit: "4564.44" }
        notes: "Case 4: Robert's remainder after DRO alternate payee deduction"
      - id: TC-PAY-MAX-05
        description: "Negative — zero benefit"
        type: negative
        inputs: { finalMonthlyBenefit: "0.00" }
        expected: { error: "Benefit cannot be zero" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.1"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-JS-100
  # =========================================================================
  - rule_id: RULE-JS-100
    rule_name: "100% Joint & Survivor Option"
    category: payment_options
    description: >
      Reduced benefit that, upon member's death, continues at 100% of the
      member's reduced amount to the designated beneficiary for life.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: paymentOptionElection
        operator: eq
        value: "100_js"
    formula:
      expression: "memberBenefit = maximumBenefit * jsFacto100; survivorBenefit = memberBenefit * 1.00"
      variables:
        - name: jsFactor100
          source: "constant.JS_FACTOR_100"
          description: "ASSUMPTION Q-CALC-04: Placeholder 0.8850"
    result:
      type: calculation
      output_fields:
        - name: memberMonthlyBenefit
          type: decimal
          format: monetary
        - name: survivorMonthlyBenefit
          type: decimal
          format: monetary
          description: "100% of member's reduced benefit"
        - name: jsFactor
          type: decimal
          format: percentage
    source_reference:
      document: "RMC"
      section: "§18-410(a)(1)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-PAY-MAXIMUM]
    assumptions:
      - id: Q-CALC-04
        description: "Placeholder factor 0.8850. Actual depends on member/beneficiary ages."
        impact: "All 100% J&S dollar amounts are illustrative"
        status: OPEN
    test_cases:
      - id: TC-JS100-01
        description: "Martinez — $6,117.68 × 0.8850"
        type: happy_path
        inputs: { maximumBenefit: "6117.68", jsFactor: "0.8850" }
        expected: { memberMonthlyBenefit: "5414.15", survivorMonthlyBenefit: "5414.15" }
      - id: TC-JS100-02
        description: "Washington — $1,198.03 × 0.8850"
        type: happy_path
        inputs: { maximumBenefit: "1198.03", jsFactor: "0.8850" }
        expected: { memberMonthlyBenefit: "1060.26", survivorMonthlyBenefit: "1060.26" }
      - id: TC-JS100-02a
        description: "Case 4 — 100% J&S after DRO ($4,564.44 × 0.8850)"
        type: happy_path
        inputs: { maximumBenefit: "4564.44", jsFactor: "0.8850" }
        expected: { memberMonthlyBenefit: "4039.53", survivorMonthlyBenefit: "4039.53" }
        notes: "Case 4: Robert's remainder after DRO, then 100% J&S"
      - id: TC-JS100-03
        description: "Verify survivor = 100% of member amount"
        type: boundary
        inputs: { maximumBenefit: "5000.00", jsFactor: "0.8850" }
        expected: { memberMonthlyBenefit: "4425.00", survivorMonthlyBenefit: "4425.00" }
      - id: TC-JS100-04
        description: "Negative — no beneficiary designated"
        type: negative
        inputs: { maximumBenefit: "5000.00", beneficiaryDesignated: false }
        expected: { error: "J&S option requires designated beneficiary" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.2"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-JS-75
  # =========================================================================
  - rule_id: RULE-JS-75
    rule_name: "75% Joint & Survivor Option"
    category: payment_options
    description: >
      Reduced benefit that, upon member's death, continues at 75% of the
      member's reduced amount to the designated beneficiary for life.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: paymentOptionElection
        operator: eq
        value: "75_js"
    formula:
      expression: "memberBenefit = maximumBenefit * jsFactor75; survivorBenefit = memberBenefit * 0.75"
      variables:
        - name: jsFactor75
          source: "constant.JS_FACTOR_75"
          description: "ASSUMPTION Q-CALC-04: Placeholder 0.9150"
    result:
      type: calculation
      output_fields:
        - name: memberMonthlyBenefit
          type: decimal
          format: monetary
        - name: survivorMonthlyBenefit
          type: decimal
          format: monetary
          description: "75% of member's reduced benefit"
        - name: jsFactor
          type: decimal
          format: percentage
    source_reference:
      document: "RMC"
      section: "§18-410(a)(1)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-PAY-MAXIMUM]
    assumptions:
      - id: Q-CALC-04
        description: "Placeholder factor 0.9150."
        impact: "All 75% J&S dollar amounts are illustrative"
        status: OPEN
    test_cases:
      - id: TC-JS75-01
        description: "Martinez — elects 75% J&S, $6,117.68 × 0.9150"
        type: happy_path
        inputs: { maximumBenefit: "6117.68", jsFactor: "0.9150" }
        expected:
          memberMonthlyBenefit: "5597.68"
          survivorMonthlyBenefit: "4198.26"
        notes: "Case 1: Robert elects 75% J&S with Elena"
      - id: TC-JS75-01a
        description: "Case 4 — 75% J&S after DRO ($4,564.44 × 0.9150)"
        type: happy_path
        inputs: { maximumBenefit: "4564.44", jsFactor: "0.9150" }
        expected:
          memberMonthlyBenefit: "4176.46"
          survivorMonthlyBenefit: "3132.35"
        notes: "Case 4: Robert's remainder after DRO, then 75% J&S with Elena"
      - id: TC-JS75-02
        description: "Verify survivor = 75% of member"
        type: boundary
        inputs: { maximumBenefit: "4000.00", jsFactor: "0.9150" }
        expected:
          memberMonthlyBenefit: "3660.00"
          survivorMonthlyBenefit: "2745.00"
      - id: TC-JS75-03
        description: "With early reduction applied first"
        type: happy_path
        inputs: { maximumBenefit: "1633.07", jsFactor: "0.9150" }
        expected:
          memberMonthlyBenefit: "1494.26"
          survivorMonthlyBenefit: "1120.70"
      - id: TC-JS75-04
        description: "Negative — unmarried member, no consent needed"
        type: negative
        inputs: { maritalStatus: "single", paymentOption: "75_js" }
        expected: { spousalConsentRequired: false }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.3"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-JS-50
  # =========================================================================
  - rule_id: RULE-JS-50
    rule_name: "50% Joint & Survivor Option"
    category: payment_options
    description: >
      Reduced benefit that, upon member's death, continues at 50% of the
      member's reduced amount to the designated beneficiary for life.
      This is the default option for married members who fail to elect.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: paymentOptionElection
        operator: eq
        value: "50_js"
    formula:
      expression: "memberBenefit = maximumBenefit * jsFactor50; survivorBenefit = memberBenefit * 0.50"
      variables:
        - name: jsFactor50
          source: "constant.JS_FACTOR_50"
          description: "ASSUMPTION Q-CALC-04: Placeholder 0.9450"
    result:
      type: calculation
      output_fields:
        - name: memberMonthlyBenefit
          type: decimal
          format: monetary
        - name: survivorMonthlyBenefit
          type: decimal
          format: monetary
          description: "50% of member's reduced benefit"
        - name: jsFactor
          type: decimal
          format: percentage
    source_reference:
      document: "RMC"
      section: "§18-410(a)(1)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-PAY-MAXIMUM]
    assumptions:
      - id: Q-CALC-04
        description: "Placeholder factor 0.9450."
        impact: "All 50% J&S dollar amounts are illustrative"
        status: OPEN
    test_cases:
      - id: TC-JS50-01
        description: "Washington — elects 50% J&S, $1,198.03 × 0.9450"
        type: happy_path
        inputs: { maximumBenefit: "1198.03", jsFactor: "0.9450" }
        expected:
          memberMonthlyBenefit: "1132.14"
          survivorMonthlyBenefit: "566.07"
        notes: "Case 3: David elects 50% J&S"
      - id: TC-JS50-02
        description: "Verify survivor = 50% of member"
        type: boundary
        inputs: { maximumBenefit: "6000.00", jsFactor: "0.9450" }
        expected:
          memberMonthlyBenefit: "5670.00"
          survivorMonthlyBenefit: "2835.00"
      - id: TC-JS50-03
        description: "Default for married member with no election"
        type: edge_case
        inputs: { maritalStatus: "married", paymentOptionElection: null }
        expected:
          defaultApplied: true
          paymentOption: "50_js"
        notes: "See RULE-JS-DEFAULT"
      - id: TC-JS50-04
        description: "Negative — cannot elect J&S without beneficiary"
        type: negative
        inputs: { beneficiaryDesignated: false }
        expected: { error: "J&S requires beneficiary" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.4"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-JS-DEFAULT
  # =========================================================================
  - rule_id: RULE-JS-DEFAULT
    rule_name: "Default Payment Option for Married Members"
    category: payment_options
    description: >
      If a married member fails to elect a payment option, the default is
      50% J&S with spouse as beneficiary. Unmarried member defaults to Maximum.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: paymentOptionElection
        operator: is_null
        notes: "No explicit election made"
    result:
      type: routing
      output_fields:
        - name: defaultPaymentOption
          type: enum
          description: "'50_js' if married, 'maximum' if unmarried"
        - name: defaultBeneficiary
          type: string
          description: "Spouse if married, N/A if unmarried"
    source_reference:
      document: "RMC"
      section: "§18-410(a)(1)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-PAY-MAXIMUM, RULE-JS-50]
    assumptions: []
    test_cases:
      - id: TC-DEFAULT-01
        description: "Married, no election — defaults to 50% J&S with spouse"
        type: happy_path
        inputs: { maritalStatus: "married", paymentOptionElection: null }
        expected: { defaultPaymentOption: "50_js", defaultBeneficiary: "spouse" }
      - id: TC-DEFAULT-02
        description: "Unmarried, no election — defaults to Maximum"
        type: happy_path
        inputs: { maritalStatus: "single", paymentOptionElection: null }
        expected: { defaultPaymentOption: "maximum", defaultBeneficiary: null }
      - id: TC-DEFAULT-03
        description: "Boundary — election exists, no default applied"
        type: boundary
        inputs: { maritalStatus: "married", paymentOptionElection: "75_js" }
        expected: { defaultApplied: false }
      - id: TC-DEFAULT-04
        description: "Negative — widowed, no election"
        type: edge_case
        inputs: { maritalStatus: "widowed", paymentOptionElection: null }
        expected: { defaultPaymentOption: "maximum" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.5"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-SPOUSAL-CONSENT
  # =========================================================================
  - rule_id: RULE-SPOUSAL-CONSENT
    rule_name: "Spousal Consent Requirement"
    category: payment_options
    description: >
      If married, spouse must be designated as beneficiary for at least 50%
      J&S option UNLESS spouse provides notarized written consent to waive.
      Consent form cannot be signed more than 90 days before first payment.
      Consent is irrevocable.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: maritalStatus
        operator: eq
        value: "married"
        join: AND
      - field: derived.beneficiaryIsSpouse
        operator: eq
        value: false
        join: OR
      - field: derived.electedOptionLessThan50JS
        operator: eq
        value: true
    result:
      type: validation
      output_fields:
        - name: spousalConsentRequired
          type: boolean
        - name: consentReceived
          type: boolean
        - name: consentTimingValid
          type: boolean
          description: "Consent signed within 90 days of first payment"
        - name: blocksProcessing
          type: boolean
          description: "True if consent required but not received"
    source_reference:
      document: "RMC"
      section: "§18-410(a)(1)"
      verification: CONFIRMED
      notes: "Also confirmed by Spousal Consent At Retirement form"
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-JS-50]
    assumptions: []
    test_cases:
      - id: TC-CONSENT-01
        description: "Married, elects Maximum — consent required"
        type: happy_path
        inputs: { maritalStatus: "married", paymentOption: "maximum", beneficiaryIsSpouse: false }
        expected: { spousalConsentRequired: true }
      - id: TC-CONSENT-02
        description: "Married, elects 75% J&S with spouse — no consent needed"
        type: boundary
        inputs: { maritalStatus: "married", paymentOption: "75_js", beneficiaryIsSpouse: true }
        expected: { spousalConsentRequired: false }
        notes: "Case 1: Martinez elects 75% J&S with Elena — no consent needed"
      - id: TC-CONSENT-03
        description: "Married, 50% J&S with non-spouse — consent required"
        type: edge_case
        inputs: { maritalStatus: "married", paymentOption: "50_js", beneficiaryIsSpouse: false }
        expected: { spousalConsentRequired: true }
      - id: TC-CONSENT-04
        description: "Consent signed 91 days before payment — too early"
        type: negative
        inputs: { consentDate: "2025-12-01", firstPaymentDate: "2026-04-01" }
        expected: { consentTimingValid: false, blocksProcessing: true }
        notes: "121 days > 90 day limit"
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.6"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-BENEFICIARY-PREDECEASE
  # =========================================================================
  - rule_id: RULE-BENEFICIARY-PREDECEASE
    rule_name: "Beneficiary Predeceases Member"
    category: payment_options
    description: >
      If J&S beneficiary predeceases the member, the member's benefit is
      increased prospectively to the Maximum (single life) amount. Member
      may NOT select a new beneficiary.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: derived.beneficiaryDeceased
        operator: eq
        value: true
      - field: derived.paymentOptionIsJS
        operator: eq
        value: true
    result:
      type: calculation
      output_fields:
        - name: newMonthlyBenefit
          type: decimal
          format: monetary
          description: "Increased to Maximum amount"
        - name: benefitIncrease
          type: decimal
          format: monetary
        - name: canSelectNewBeneficiary
          type: boolean
          description: "Always false"
    source_reference:
      document: "Retirement Application"
      section: "Page 2 — explicit statement"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-PAY-MAXIMUM]
    assumptions: []
    test_cases:
      - id: TC-PREDECEASE-01
        description: "Beneficiary dies — member reverts to Maximum"
        type: happy_path
        inputs:
          currentBenefit: "5597.68"
          maximumBenefit: "6117.68"
          beneficiaryDeceased: true
        expected:
          newMonthlyBenefit: "6117.68"
          benefitIncrease: "520.00"
          canSelectNewBeneficiary: false
      - id: TC-PREDECEASE-02
        description: "Boundary — 50% J&S to Maximum"
        type: boundary
        inputs:
          currentBenefit: "1132.14"
          maximumBenefit: "1198.03"
          beneficiaryDeceased: true
        expected:
          newMonthlyBenefit: "1198.03"
          canSelectNewBeneficiary: false
      - id: TC-PREDECEASE-03
        description: "Already on Maximum — no change"
        type: edge_case
        inputs: { currentBenefit: "6117.68", maximumBenefit: "6117.68", beneficiaryDeceased: true }
        expected: { newMonthlyBenefit: "6117.68", benefitIncrease: "0.00" }
      - id: TC-PREDECEASE-04
        description: "Negative — beneficiary alive, no change"
        type: negative
        inputs: { beneficiaryDeceased: false }
        expected: { ruleApplies: false }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 5.7"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"
