# ===========================================================================
# NoUI DERP POC — Rule Definition Schema
# ===========================================================================
# Every rule YAML file must conform to this structure.
# This schema is the contract between rule authors and the rules engine.
#
# Conventions (from CRITICAL-002):
#   - Monetary values: strings with 2 decimals ("10639.45")
#   - Percentages: string decimals ("0.03" = 3%, "0.0845" = 8.45%)
#   - Enums: all lowercase
#   - Field names: camelCase, matching 002_domain_entity_specifications.md
#   - AMS: computed by Connector; engine trusts the value
#
# Assumptions in effect (build with these, adjust when DERP confirms):
#   Q-CALC-01: Banker's rounding on final monthly benefit only
#   Q-CALC-02: Partial year service = months/12
#   Q-CALC-03: Reduction uses integer age only (no monthly proration)
#   Q-CALC-04: J&S factors are placeholders (100%: 0.8850, 75%: 0.9150, 50%: 0.9450)
#
# Version: 1.0
# Date: 2026-02-24
# Stream: S2 — Rules & Calculation Engine Design
# ===========================================================================

schema_version: "1.0"

# ---------------------------------------------------------------------------
# File-level metadata (required at top of every rule YAML file)
# ---------------------------------------------------------------------------
file_metadata:
  category: string          # One of: membership, service_credit, eligibility,
                            #   benefit_calculation, payment_options, dro,
                            #   supplemental, process
  description: string       # What this file covers
  evaluation_order: integer # Order this category is evaluated (1 = first)
  rule_count: integer       # Number of rules in this file
  governing_authority: string  # "RMC §18-391 through §18-430.7"
  schema_version: string    # Must match schema_version above

# ---------------------------------------------------------------------------
# Rule definition structure
# ---------------------------------------------------------------------------
rule_definition:

  # --- Identity -----------------------------------------------------------
  rule_id: string
    # Format: RULE-{CATEGORY}-{NAME}
    # Must match derp-business-rules-inventory.docx exactly
    # Examples: RULE-TIER-1, RULE-SVC-EARNED, RULE-RULE-OF-75

  rule_name: string
    # Human-readable name matching inventory

  category: string
    # Must match file_metadata.category

  description: string
    # Precise rule statement from inventory — the authoritative English rule

  # --- Applicability ------------------------------------------------------
  tier_applicability: list[integer]
    # Which tiers this rule applies to: [1], [2], [3], [1, 2], [1, 2, 3]
    # For tier determination rules, list only the tier being determined

  # --- Conditions ---------------------------------------------------------
  # Evaluated in order. AND semantics by default (short-circuit on failure).
  conditions: list[condition]
    # Each condition:
    #   field: string        — Domain entity field (camelCase) from
    #                          002_domain_entity_specifications.md
    #   operator: string     — eq, neq, gt, gte, lt, lte, in, between,
    #                          not_in, is_null, is_not_null
    #   value: any           — Comparison value (type matches field)
    #   join: string         — AND | OR (default: AND)
    #
    # For compound logic, use condition_groups:
    #   condition_groups:
    #     - join: AND
    #       conditions: [...]
    #     - join: OR
    #       conditions: [...]

  # --- Lookup Tables ------------------------------------------------------
  # For rules with statutory tables (reductions, death benefits).
  # Prefer tables over computed formulas to match statute exactly.
  lookup_table: map[string, any]
    # Key: lookup field value (e.g., integer age as string)
    # Value: result (e.g., reduction factor, dollar amount)

  # --- Formula ------------------------------------------------------------
  # For calculation rules. Omit for pure determination/validation rules.
  formula:
    expression: string       # Human-readable: "ams * multiplier * serviceYears"
    variables: list[variable]
      # Each variable:
      #   name: string        — Variable name used in expression
      #   source: string      — Origin:
      #                         "input.{fieldName}" — domain entity
      #                         "rule.{RULE-ID}.output" — another rule's result
      #                         "lookup.{table}.{key}" — lookup table
      #                         "constant.{name}" — hardcoded value
      #                         "connector.{endpoint}" — Connector API
      #   description: string — What this variable represents

  # --- Result -------------------------------------------------------------
  result:
    type: string
      # determination — boolean or enum (eligible/ineligible)
      # calculation   — numeric value
      # validation    — pass/fail with messages
      # routing       — next-step or workflow direction
      # derivation    — intermediate value for downstream rules
    output_fields: list[output_field]
      # Each:
      #   name: string      — Field name in result object
      #   type: string      — boolean, string, decimal, integer, date, enum
      #   description: string
      #   format: string    — Optional: "monetary", "percentage", "years"

  # --- Source Reference (REQUIRED) ----------------------------------------
  source_reference:
    document: string         # "RMC", "DERP Handbook", "Board Resolution"
    section: string          # "§18-409(a)(1)"
    url: string              # Optional
    verification: string     # CONFIRMED | ASSUMED | OPEN
    notes: string            # Optional clarification

  # --- Effective Dating ---------------------------------------------------
  effective_date: date       # ISO 8601, when provision was enacted
  end_date: date             # null for current rules

  # --- Dependencies -------------------------------------------------------
  depends_on: list[string]   # Rule IDs that must evaluate first

  # --- Assumptions --------------------------------------------------------
  assumptions: list[assumption]
    # Each:
    #   id: string           — e.g., "Q-CALC-02"
    #   description: string
    #   impact: string       — What happens if wrong
    #   status: string       — OPEN | ACCEPTED | RESOLVED

  # --- Test Cases (REQUIRED — minimum 4 per rule) -------------------------
  # 1. Happy path — normal case
  # 2. Boundary — exact threshold
  # 3. Just below — one unit below threshold
  # 4. Negative — case where rule should NOT fire
  test_cases: list[test_case]
    # Each:
    #   id: string           — Unique within rule (e.g., "TC-TIER1-01")
    #   description: string
    #   type: string         — happy_path, boundary, just_below, negative, edge_case
    #   inputs: map          — Domain entity field names
    #   expected: map        — Expected output values
    #   notes: string        — Optional

  # --- Governance ---------------------------------------------------------
  governance:
    version: string          # "1.0.0"
    last_updated: date
    certified_by: string     # "PENDING" until human certifies
    certified_date: date     # null until certified
    inventory_ref: string    # "Section 1.1" — ref to inventory doc
    change_history: list[change]
      # Each:
      #   date: date
      #   description: string
      #   author: string

# ---------------------------------------------------------------------------
# Shared lookup tables (file-level, referenced by rules)
# ---------------------------------------------------------------------------
# Define once, reference via "lookup.{table_name}.{key}" in rule formulas.
#
# shared_tables:
#   table_name:
#     source: string         — RMC section
#     description: string
#     entries: map[string, string]
