# ===========================================================================
# NoUI DERP POC — Supplemental Benefits (IPR & Death Benefit)
# ===========================================================================
# Category 7: IPR provides health insurance assistance. Lump-sum death
# benefit is an irrevocable election at retirement.
# Evaluation order: 7
# ===========================================================================

file_metadata:
  category: supplemental
  description: "IPR calculation and lump-sum death benefit tables."
  evaluation_order: 7
  rule_count: 6
  governing_authority: "RMC §18-391 through §18-430.7"
  schema_version: "1.0"

rules:

  # =========================================================================
  # RULE-IPR
  # =========================================================================
  - rule_id: RULE-IPR
    rule_name: "Insurance Premium Reduction"
    category: supplemental
    description: >
      IPR provides monthly supplement: $12.50/year of earned service
      (non-Medicare) or $6.25/year (Medicare eligible). Purchased service
      excluded from IPR.
    tier_applicability: [1, 2, 3]
    formula:
      expression: "iprMonthly = earnedServiceYears * iprRate"
      variables:
        - name: earnedServiceYears
          source: "rule.RULE-SVC-PURCHASED.output.totalServiceForIPR"
          description: "Earned service only"
        - name: iprRate
          source: "constant.IPR_RATE_PRE_MEDICARE or IPR_RATE_POST_MEDICARE"
          description: "$12.50 pre-Medicare, $6.25 post-Medicare"
    result:
      type: calculation
      output_fields:
        - name: preMedicareMonthly
          type: decimal
          format: monetary
        - name: postMedicareMonthly
          type: decimal
          format: monetary
        - name: medicareTransitionAge
          type: integer
          description: "Age 65 (standard assumption)"
    source_reference:
      document: "RMC"
      section: "§18-412"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-SVC-PURCHASED]
    assumptions:
      - id: IPR-MEDICARE-01
        description: "Medicare eligibility at age 65 (standard). Disability Medicare not modeled."
        impact: "Early Medicare eligibility would trigger lower rate sooner"
        status: ACCEPTED
      - id: IPR-EARNED-01
        description: "IPR uses earned service only. Consistent with purchased-service exclusion."
        impact: "None — confirmed"
        status: ACCEPTED
    test_cases:
      - id: TC-IPR-01
        description: "Martinez — 28.75 years × $12.50"
        type: happy_path
        inputs: { totalServiceForIPR: 28.75 }
        expected: { preMedicareMonthly: "359.38", postMedicareMonthly: "179.69" }
        notes: "Case 1: 28.75 × 12.50 = 359.375 → 359.38; 28.75 × 6.25 = 179.6875 → 179.69"
      - id: TC-IPR-02
        description: "Washington — 13.58 years × $12.50"
        type: happy_path
        inputs: { totalServiceForIPR: 13.58 }
        expected: { preMedicareMonthly: "169.75", postMedicareMonthly: "84.88" }
        notes: "Case 3: 13.58 × 12.50 = 169.75; 13.58 × 6.25 = 84.875 → 84.88"
      - id: TC-IPR-03
        description: "Kim — purchased service excluded from IPR"
        type: boundary
        inputs: { earnedServiceYears: 18.17, purchasedServiceYears: 3.00, totalServiceForIPR: 18.17 }
        expected: { preMedicareMonthly: "227.13" }
        notes: "Uses 18.17 (earned), NOT 21.17 (total)"
      - id: TC-IPR-04
        description: "Negative — DRO alternate payee gets no IPR"
        type: negative
        inputs: { isAlternatePayee: true }
        expected: { iprEligible: false }
        notes: "See RULE-DRO-NO-IPR"
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 7.1"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DEATH-NORMAL
  # =========================================================================
  - rule_id: RULE-DEATH-NORMAL
    rule_name: "Lump-Sum Death Benefit (Normal/Rule of N)"
    category: supplemental
    description: >
      For normal retirement, Rule of 75, Rule of 85, or Disability
      Retirement after age 65: lump-sum death benefit is $5,000.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: derived.retirementType
        operator: in
        value: ["normal", "rule_of_75", "rule_of_85"]
    result:
      type: calculation
      output_fields:
        - name: lumpSumDeathBenefit
          type: decimal
          format: monetary
          description: "Always $5,000"
    source_reference:
      document: "RMC"
      section: "§18-411(d)(1-2)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-ELIG-HIERARCHY]
    assumptions:
      - id: DEATH-ACTIVE-01
        description: "Must retire directly from active service. Deferred retirees NOT eligible."
        impact: "Deferred members get $0 death benefit"
        status: ACCEPTED
    test_cases:
      - id: TC-DEATH-NORM-01
        description: "Martinez — Rule of 75, $5,000"
        type: happy_path
        inputs: { retirementType: "rule_of_75" }
        expected: { lumpSumDeathBenefit: "5000.00" }
      - id: TC-DEATH-NORM-02
        description: "Normal retirement, $5,000"
        type: happy_path
        inputs: { retirementType: "normal" }
        expected: { lumpSumDeathBenefit: "5000.00" }
      - id: TC-DEATH-NORM-03
        description: "Rule of 85, $5,000"
        type: boundary
        inputs: { retirementType: "rule_of_85" }
        expected: { lumpSumDeathBenefit: "5000.00" }
      - id: TC-DEATH-NORM-04
        description: "Case 4 — Rule of 75 with DRO, still $5,000"
        type: happy_path
        inputs: { retirementType: "rule_of_75", computedTier: 1, hasDRO: true }
        expected: { lumpSumDeathBenefit: "5000.00", droAffects: false }
        notes: "Case 4: DRO does not reduce the death benefit amount"
      - id: TC-DEATH-NORM-05
        description: "Negative — deferred member, $0"
        type: negative
        inputs: { retirementType: "deferred" }
        expected: { lumpSumDeathBenefit: "0.00" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 7.2"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DEATH-EARLY-T12
  # =========================================================================
  - rule_id: RULE-DEATH-EARLY-T12
    rule_name: "Lump-Sum Death Benefit (Early Retirement, Tiers 1 & 2)"
    category: supplemental
    description: >
      For early retirement: $5,000 minus $250 per completed year under 65.
      Statutory dollar-amount table by integer age.
    tier_applicability: [1, 2]
    lookup_table:
      source: "RMC §18-411(d)(1)"
      description: "Tiers 1 & 2 early retirement death benefit by integer age"
      entries:
        "55": "2500"
        "56": "2750"
        "57": "3000"
        "58": "3250"
        "59": "3500"
        "60": "3750"
        "61": "4000"
        "62": "4250"
        "63": "4500"
        "64": "4750"
        "65": "5000"
    conditions:
      - field: derived.retirementType
        operator: eq
        value: "early"
      - field: computedTier
        operator: in
        value: [1, 2]
    result:
      type: calculation
      output_fields:
        - name: lumpSumDeathBenefit
          type: decimal
          format: monetary
    source_reference:
      document: "RMC"
      section: "§18-411(d)(1)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-ELIG-HIERARCHY]
    assumptions:
      - id: DEATH-INT-AGE-01
        description: "Integer-age approach confirmed by statutory dollar-amount table."
        impact: "None — confirmed by statute"
        status: ACCEPTED
    test_cases:
      - id: TC-DEATH-ET12-01
        description: "Kim — age 55, $2,500"
        type: happy_path
        inputs: { integerAge: 55, computedTier: 2, retirementType: "early" }
        expected: { lumpSumDeathBenefit: "2500.00" }
        notes: "Case 2: $5,000 - ($250 × 10) = $2,500"
      - id: TC-DEATH-ET12-02
        description: "Age 64 — $4,750"
        type: boundary
        inputs: { integerAge: 64, computedTier: 1, retirementType: "early" }
        expected: { lumpSumDeathBenefit: "4750.00" }
      - id: TC-DEATH-ET12-03
        description: "Age 60 — mid-range $3,750"
        type: happy_path
        inputs: { integerAge: 60, computedTier: 1, retirementType: "early" }
        expected: { lumpSumDeathBenefit: "3750.00" }
      - id: TC-DEATH-ET12-04
        description: "Negative — Tier 3 uses different table"
        type: negative
        inputs: { integerAge: 60, computedTier: 3, retirementType: "early" }
        expected: { error: "Wrong table — use RULE-DEATH-EARLY-T3 for Tier 3" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 7.3"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DEATH-EARLY-T3
  # =========================================================================
  - rule_id: RULE-DEATH-EARLY-T3
    rule_name: "Lump-Sum Death Benefit (Early Retirement, Tier 3)"
    category: supplemental
    description: >
      For early retirement: $5,000 minus $500 per completed year under 65.
      Statutory table: age 60=$2,500 through age 64=$4,500.
    tier_applicability: [3]
    lookup_table:
      source: "RMC §18-411(d)(2)"
      description: "Tier 3 early retirement death benefit by integer age"
      entries:
        "60": "2500"
        "61": "3000"
        "62": "3500"
        "63": "4000"
        "64": "4500"
        "65": "5000"
    conditions:
      - field: derived.retirementType
        operator: eq
        value: "early"
      - field: computedTier
        operator: eq
        value: 3
    result:
      type: calculation
      output_fields:
        - name: lumpSumDeathBenefit
          type: decimal
          format: monetary
    source_reference:
      document: "RMC"
      section: "§18-411(d)(2)"
      verification: CONFIRMED
    effective_date: "2011-07-01"
    end_date: null
    depends_on: [RULE-ELIG-HIERARCHY]
    assumptions: []
    test_cases:
      - id: TC-DEATH-ET3-01
        description: "Washington — age 63, $4,000"
        type: happy_path
        inputs: { integerAge: 63, computedTier: 3, retirementType: "early" }
        expected: { lumpSumDeathBenefit: "4000.00" }
        notes: "Case 3: $5,000 - ($500 × 2) = $4,000"
      - id: TC-DEATH-ET3-02
        description: "Age 60 — maximum reduction $2,500"
        type: boundary
        inputs: { integerAge: 60 }
        expected: { lumpSumDeathBenefit: "2500.00" }
      - id: TC-DEATH-ET3-03
        description: "Age 64 — minimum reduction $4,500"
        type: boundary
        inputs: { integerAge: 64 }
        expected: { lumpSumDeathBenefit: "4500.00" }
      - id: TC-DEATH-ET3-04
        description: "Negative — Tier 1 member uses T12 table"
        type: negative
        inputs: { integerAge: 60, computedTier: 1 }
        expected: { error: "Wrong table" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 7.4"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DEATH-ELECTION
  # =========================================================================
  - rule_id: RULE-DEATH-ELECTION
    rule_name: "Death Benefit Election"
    category: supplemental
    description: >
      Lump-sum death benefit may be drawn in 50 or 100 equal monthly
      installments. Irrevocable election at retirement. Member may also
      elect NOT to draw.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: derived.lumpSumDeathBenefit
        operator: gt
        value: 0
    formula:
      expression: "installmentAmount = lumpSumDeathBenefit / electedInstallments"
      variables:
        - name: electedInstallments
          source: "input.deathBenefitElection"
          description: "50, 100, or null (do not draw)"
    result:
      type: calculation
      output_fields:
        - name: installmentAmount
          type: decimal
          format: monetary
        - name: installmentCount
          type: integer
        - name: isIrrevocable
          type: boolean
          description: "Always true"
    source_reference:
      document: "RMC"
      section: "§18-411(d)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DEATH-NORMAL, RULE-DEATH-EARLY-T12, RULE-DEATH-EARLY-T3]
    assumptions: []
    test_cases:
      - id: TC-DEATH-ELECT-01
        description: "Martinez — $5,000 in 50 installments"
        type: happy_path
        inputs: { lumpSumDeathBenefit: "5000.00", electedInstallments: 50 }
        expected: { installmentAmount: "100.00", isIrrevocable: true }
      - id: TC-DEATH-ELECT-01a
        description: "Martinez — $5,000 in 100 installments"
        type: happy_path
        inputs: { lumpSumDeathBenefit: "5000.00", electedInstallments: 100 }
        expected: { installmentAmount: "50.00", isIrrevocable: true }
        notes: "Case 1: Alternative election option for Robert"
      - id: TC-DEATH-ELECT-01b
        description: "Kim — $2,500 in 50 installments"
        type: happy_path
        inputs: { lumpSumDeathBenefit: "2500.00", electedInstallments: 50 }
        expected: { installmentAmount: "50.00", isIrrevocable: true }
        notes: "Case 2: Early retirement reduced death benefit"
      - id: TC-DEATH-ELECT-02
        description: "Washington — $4,000 in 100 installments"
        type: happy_path
        inputs: { lumpSumDeathBenefit: "4000.00", electedInstallments: 100 }
        expected: { installmentAmount: "40.00" }
      - id: TC-DEATH-ELECT-03
        description: "Elect not to draw"
        type: boundary
        inputs: { lumpSumDeathBenefit: "5000.00", electedInstallments: null }
        expected: { installmentAmount: "0.00", installmentCount: 0 }
      - id: TC-DEATH-ELECT-04
        description: "Negative — invalid installment count"
        type: negative
        inputs: { electedInstallments: 75 }
        expected: { error: "Must be 50 or 100" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 7.5"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DEATH-REEMPLOY
  # =========================================================================
  - rule_id: RULE-DEATH-REEMPLOY
    rule_name: "Death Benefit Re-Employment Exclusion"
    category: supplemental
    description: >
      Re-employed retirees are NOT entitled to a subsequent death benefit.
      The original amount from first retirement applies.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: derived.isReemployedRetiree
        operator: eq
        value: true
    result:
      type: validation
      output_fields:
        - name: newDeathBenefitEligible
          type: boolean
          description: "Always false for re-employed retirees"
        - name: originalDeathBenefit
          type: decimal
          format: monetary
          description: "Amount from original retirement"
    source_reference:
      document: "RMC"
      section: "§18-408(j)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DEATH-ELECTION]
    assumptions: []
    test_cases:
      - id: TC-DEATH-REEMP-01
        description: "Re-employed — no new death benefit"
        type: happy_path
        inputs: { isReemployedRetiree: true, originalDeathBenefit: "5000.00" }
        expected: { newDeathBenefitEligible: false, originalDeathBenefit: "5000.00" }
      - id: TC-DEATH-REEMP-02
        description: "First-time retiree — normal death benefit"
        type: boundary
        inputs: { isReemployedRetiree: false }
        expected: { newDeathBenefitEligible: true }
      - id: TC-DEATH-REEMP-03
        description: "Re-employed with original $2,500 — keeps original"
        type: edge_case
        inputs: { isReemployedRetiree: true, originalDeathBenefit: "2500.00" }
        expected: { originalDeathBenefit: "2500.00", newDeathBenefitEligible: false }
      - id: TC-DEATH-REEMP-04
        description: "Negative — not re-employed"
        type: negative
        inputs: { isReemployedRetiree: false }
        expected: { ruleApplies: false }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 7.6"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"
