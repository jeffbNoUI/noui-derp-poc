# ===========================================================================
# NoUI DERP POC — Domestic Relations Orders (DRO) Rules
# ===========================================================================
# Category 6: Division of pension benefits pursuant to court orders.
# Critical principle: DRO split happens FIRST, before payment option.
# Evaluation order: 6
# ===========================================================================

file_metadata:
  category: dro
  description: "DRO marital share calculation, sequencing, division methods, and exclusions."
  evaluation_order: 6
  rule_count: 6
  governing_authority: "RMC §18-391 through §18-430.7"
  schema_version: "1.0"

rules:

  # =========================================================================
  # RULE-DRO-MARITAL-SHARE
  # =========================================================================
  - rule_id: RULE-DRO-MARITAL-SHARE
    rule_name: "DRO Marital Share Calculation"
    category: dro
    description: >
      Marital fraction = service credit during marriage / total service at
      retirement. Marital share = maximum benefit × marital fraction.
      Alternate payee receives their awarded percentage of the marital share.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: dro.exists
        operator: eq
        value: true
    formula:
      expression: >
        maritalServiceYears = overlapMonths(marriageDate, divorceDate, hireDate, retirementDate) / 12;
        maritalFraction = maritalServiceYears / totalServiceForBenefit;
        maritalShare = maximumBenefit * maritalFraction;
        alternatePayeeAmount = maritalShare * droAwardPercentage
      variables:
        - name: marriageDate
          source: "input.dro.marriageDate"
          description: "Date of marriage"
        - name: divorceDate
          source: "input.dro.divorceDate"
          description: "Date of divorce"
        - name: hireDate
          source: "input.hireDate"
          description: "Employment start (caps marital service start)"
        - name: droAwardPercentage
          source: "input.dro.awardPercentage"
          description: "Percentage of marital share awarded to alternate payee"
    result:
      type: calculation
      output_fields:
        - name: maritalServiceYears
          type: decimal
          format: years
        - name: maritalFraction
          type: decimal
          format: percentage
        - name: maritalShare
          type: decimal
          format: monetary
        - name: alternatePayeeMonthly
          type: decimal
          format: monetary
        - name: memberRemainder
          type: decimal
          format: monetary
          description: "Maximum benefit minus alternate payee amount"
    source_reference:
      document: "RMC"
      section: "§18-418(b)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-PAY-MAXIMUM, RULE-SVC-EARNED]
    assumptions:
      - id: DRO-OVERLAP-01
        description: >
          Service during marriage = overlap of [marriageDate, divorceDate]
          and [hireDate, retirementDate]. If marriage predates employment,
          marital service starts at hire date.
        impact: "Changes marital fraction numerator"
        status: ACCEPTED
    test_cases:
      - id: TC-DRO-MS-01
        description: "Case 4 — Martinez DRO: 40% of marital share"
        type: happy_path
        inputs:
          marriageDate: "1999-08-15"
          divorceDate: "2017-11-03"
          hireDate: "1997-06-15"
          retirementDate: "2026-04-01"
          totalServiceForBenefit: 28.75
          maximumBenefit: "6117.68"
          droAwardPercentage: "0.40"
        expected:
          maritalServiceYears: 18.25
          maritalFraction: "0.6348"
          maritalShare: "3883.10"
          alternatePayeeMonthly: "1553.24"
          memberRemainder: "4564.44"
        notes: "Marriage Aug 1999 to Nov 2017 = 18.25 yrs. 18.25/28.75 = 0.63478. Share: 6117.68 × 0.63478 = 3883.10. Patricia: 3883.10 × 0.40 = 1553.24. Robert: 6117.68 - 1553.24 = 4564.44"

      - id: TC-DRO-MS-02
        description: "Marriage predates employment — marital service starts at hire"
        type: edge_case
        inputs:
          marriageDate: "1990-01-01"
          divorceDate: "2015-06-01"
          hireDate: "1997-06-15"
          retirementDate: "2026-04-01"
          totalServiceForBenefit: 28.75
          maximumBenefit: "5000.00"
          droAwardPercentage: "0.50"
        expected:
          maritalServiceYears: 17.92
        notes: "Marital service starts at hireDate (1997-06-15), not marriageDate (1990)"

      - id: TC-DRO-MS-03
        description: "Boundary — 50% award of 100% marital fraction"
        type: boundary
        inputs:
          marriageDate: "1997-06-15"
          divorceDate: "2026-04-01"
          hireDate: "1997-06-15"
          retirementDate: "2026-04-01"
          totalServiceForBenefit: 28.75
          maximumBenefit: "6000.00"
          droAwardPercentage: "0.50"
        expected:
          maritalFraction: "1.0000"
          alternatePayeeMonthly: "3000.00"

      - id: TC-DRO-MS-04
        description: "Negative — no DRO on file"
        type: negative
        inputs: { dro: { exists: false } }
        expected: { ruleApplies: false }

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 6.1"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DRO-SEQUENCE
  # =========================================================================
  - rule_id: RULE-DRO-SEQUENCE
    rule_name: "DRO Split Before Payment Option"
    category: dro
    description: >
      DRO split is calculated on the Maximum (single life) benefit FIRST.
      The member's remaining benefit (after DRO) is then subject to J&S
      option selection. The alternate payee's amount is NOT affected by the
      member's payment option election.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: dro.exists
        operator: eq
        value: true
    result:
      type: routing
      output_fields:
        - name: calculationOrder
          type: list
          description: "1: Calculate maximum. 2: Apply DRO split. 3: Apply J&S to remainder."
        - name: alternatePayeeAffectedByJS
          type: boolean
          description: "Always false"
    source_reference:
      document: "RMC"
      section: "§18-418(b)"
      verification: CONFIRMED
      notes: "Confirmed in doc07 Section 6. This is the single most important DRO sequencing rule."
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DRO-MARITAL-SHARE]
    assumptions: []
    test_cases:
      - id: TC-DRO-SEQ-01
        description: "Case 4 — DRO split then J&S on remainder"
        type: happy_path
        inputs:
          maximumBenefit: "6117.68"
          alternatePayeeAmount: "1553.24"
          memberRemainder: "4564.44"
          paymentOption: "75_js"
          jsFactor: "0.9150"
        expected:
          memberAfterJS: "4176.46"
          survivorBenefit: "3132.35"
          patriciaBenefit: "1553.24"
        notes: "Patricia's $1,553.24 is unaffected by Robert's 75% J&S election"

      - id: TC-DRO-SEQ-02
        description: "Verify alternate payee unaffected by J&S change"
        type: boundary
        inputs:
          maximumBenefit: "6117.68"
          alternatePayeeAmount: "1553.24"
          paymentOption_A: "maximum"
          paymentOption_B: "100_js"
        expected:
          alternatePayee_A: "1553.24"
          alternatePayee_B: "1553.24"
        notes: "Same amount regardless of member's J&S election"

      - id: TC-DRO-SEQ-03
        description: "Wrong order — J&S then DRO = incorrect"
        type: negative
        inputs:
          order: "js_then_dro"
        expected:
          error: "DRO must be applied before J&S option"

      - id: TC-DRO-SEQ-04
        description: "No DRO — skip to J&S directly"
        type: negative
        inputs: { dro: { exists: false } }
        expected: { ruleApplies: false }

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 6.2"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DRO-METHODS
  # =========================================================================
  - rule_id: RULE-DRO-METHODS
    rule_name: "DRO Division Methods"
    category: dro
    description: >
      DROs may divide benefits by: (a) percentage of marital share (most
      common), (b) fixed dollar amount, or (c) present value offset (no
      ongoing plan involvement).
    tier_applicability: [1, 2, 3]
    conditions:
      - field: dro.divisionMethod
        operator: in
        value: ["percentage", "fixed_dollar", "present_value_offset"]
    result:
      type: routing
      output_fields:
        - name: divisionMethod
          type: enum
          description: "percentage, fixed_dollar, or present_value_offset"
        - name: requiresOngoingPayment
          type: boolean
          description: "False for present_value_offset"
    source_reference:
      document: "RMC"
      section: "§18-418(b)"
      verification: CONFIRMED
      notes: "Also confirmed in doc07 Section 4"
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DRO-MARITAL-SHARE]
    assumptions:
      - id: DRO-METHOD-01
        description: "POC implements percentage method only (Case 4). Fixed dollar is simpler."
        impact: "Fixed dollar method not demonstrated in POC"
        status: ACCEPTED
    test_cases:
      - id: TC-DRO-METHOD-01
        description: "Percentage method — Case 4"
        type: happy_path
        inputs: { divisionMethod: "percentage", awardPercentage: "0.40" }
        expected: { requiresOngoingPayment: true }
      - id: TC-DRO-METHOD-02
        description: "Fixed dollar method"
        type: edge_case
        inputs: { divisionMethod: "fixed_dollar", fixedAmount: "1000.00" }
        expected: { alternatePayeeMonthly: "1000.00", requiresOngoingPayment: true }
      - id: TC-DRO-METHOD-03
        description: "Present value offset — no plan involvement"
        type: boundary
        inputs: { divisionMethod: "present_value_offset" }
        expected: { requiresOngoingPayment: false }
      - id: TC-DRO-METHOD-04
        description: "Negative — invalid method"
        type: negative
        inputs: { divisionMethod: "other" }
        expected: { error: "Invalid DRO division method" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 6.3"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DRO-NO-IPR
  # =========================================================================
  - rule_id: RULE-DRO-NO-IPR
    rule_name: "DRO Alternate Payee IPR Exclusion"
    category: dro
    description: >
      Former spouse receiving DRO benefits is NOT eligible for IPR
      (Insurance Premium Reduction). Member retains IPR eligibility
      based on their own earned service.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: dro.exists
        operator: eq
        value: true
    result:
      type: validation
      output_fields:
        - name: alternatePayeeIPREligible
          type: boolean
          description: "Always false"
        - name: memberIPRUnaffected
          type: boolean
          description: "Member's IPR is not reduced by DRO"
    source_reference:
      document: "RMC"
      section: "§18-418(b)(8)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DRO-MARITAL-SHARE]
    assumptions:
      - id: DRO-IPR-01
        description: "Case 4 originally included Patricia's IPR — must be excluded."
        impact: "Alternate payee receives benefit only, no IPR"
        status: ACCEPTED
    test_cases:
      - id: TC-DRO-IPR-01
        description: "Case 4 — Patricia gets no IPR"
        type: happy_path
        inputs: { alternatePayee: "Patricia", dro: { exists: true } }
        expected: { alternatePayeeIPREligible: false }
      - id: TC-DRO-IPR-02
        description: "Member's IPR unaffected by DRO"
        type: boundary
        inputs: { memberId: "Robert", earnedService: 28.75, dro: { exists: true } }
        expected: { memberIPRUnaffected: true, memberIPR: "359.38" }
      - id: TC-DRO-IPR-03
        description: "No DRO — IPR rules normal"
        type: negative
        inputs: { dro: { exists: false } }
        expected: { ruleApplies: false }
      - id: TC-DRO-IPR-04
        description: "Negative — alternate payee requests IPR"
        type: negative
        inputs: { alternatePayeeRequestsIPR: true }
        expected: { denied: true, reason: "§18-418(b)(8) excludes alternate payees" }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 6.4"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DRO-NO-HEALTH
  # =========================================================================
  - rule_id: RULE-DRO-NO-HEALTH
    rule_name: "DRO Alternate Payee Health Insurance Exclusion"
    category: dro
    description: >
      Former spouse is NOT eligible for DERP health insurance benefits.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: dro.exists
        operator: eq
        value: true
    result:
      type: validation
      output_fields:
        - name: alternatePayeeHealthEligible
          type: boolean
          description: "Always false"
    source_reference:
      document: "RMC"
      section: "§18-418(b)(8)"
      verification: CONFIRMED
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DRO-MARITAL-SHARE]
    assumptions: []
    test_cases:
      - id: TC-DRO-HEALTH-01
        description: "Alternate payee — no health insurance"
        type: happy_path
        inputs: { alternatePayee: true }
        expected: { alternatePayeeHealthEligible: false }
      - id: TC-DRO-HEALTH-02
        description: "Member retains health eligibility"
        type: boundary
        inputs: { isMember: true, dro: { exists: true } }
        expected: { memberHealthUnaffected: true }
      - id: TC-DRO-HEALTH-03
        description: "Negative — workspace should not show health options for alternate payee"
        type: negative
        inputs: { userRole: "alternate_payee" }
        expected: { showHealthInsurancePanel: false }
      - id: TC-DRO-HEALTH-04
        description: "No DRO — not applicable"
        type: negative
        inputs: { dro: { exists: false } }
        expected: { ruleApplies: false }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 6.5"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DRO-COLA
  # =========================================================================
  - rule_id: RULE-DRO-COLA
    rule_name: "DRO and COLA Applicability"
    category: dro
    description: >
      Whether the alternate payee's share participates in future COLAs
      depends on the specific DRO language. Each DRO must be reviewed
      individually.
    tier_applicability: [1, 2, 3]
    conditions:
      - field: dro.exists
        operator: eq
        value: true
    result:
      type: determination
      output_fields:
        - name: alternatePayeeCOLAEligible
          type: boolean
          description: "Determined by DRO order language"
        - name: colaSource
          type: string
          description: "'dro_language' — must review each order individually"
    source_reference:
      document: "doc07"
      section: "Section 4"
      verification: ASSUMED
      notes: "COLA for alternate payees is per-DRO, not plan default"
    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-DRO-MARITAL-SHARE, RULE-COLA]
    assumptions:
      - id: Q-DRO-03
        description: "DERP's default position on COLA for alternate payees when order is silent is unknown."
        impact: "Could affect alternate payee's long-term benefit"
        status: OPEN
    test_cases:
      - id: TC-DRO-COLA-01
        description: "DRO specifies COLA participation"
        type: happy_path
        inputs: { dro: { colaProvision: "participating" } }
        expected: { alternatePayeeCOLAEligible: true }
      - id: TC-DRO-COLA-02
        description: "DRO excludes COLA"
        type: happy_path
        inputs: { dro: { colaProvision: "excluded" } }
        expected: { alternatePayeeCOLAEligible: false }
      - id: TC-DRO-COLA-03
        description: "DRO silent on COLA — needs DERP default"
        type: edge_case
        inputs: { dro: { colaProvision: null } }
        expected: { alternatePayeeCOLAEligible: null, requiresReview: true }
      - id: TC-DRO-COLA-04
        description: "No DRO"
        type: negative
        inputs: { dro: { exists: false } }
        expected: { ruleApplies: false }
    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 6.6"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"
