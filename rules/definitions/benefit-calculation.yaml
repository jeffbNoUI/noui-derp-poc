# ===========================================================================
# NoUI DERP POC — Benefit Calculation Rules
# ===========================================================================
# Category 4: Core calculation engine. Every formula, intermediate value,
# and rounding decision must be verifiable to the penny.
# Evaluation order: 4
# ===========================================================================

file_metadata:
  category: benefit_calculation
  description: "AMS, benefit formula, reduction application, and rounding. The core calculation pipeline."
  evaluation_order: 4
  rule_count: 9
  governing_authority: "RMC §18-391 through §18-430.7"
  schema_version: "1.0"

rules:

  # =========================================================================
  # RULE-AMS-WINDOW
  # =========================================================================
  - rule_id: RULE-AMS-WINDOW
    rule_name: "AMS Averaging Period"
    category: benefit_calculation
    description: >
      AMS uses the highest consecutive months of pensionable salary.
      Tiers 1 & 2: 36 consecutive months. Tier 3: 60 consecutive months.
    tier_applicability: [1, 2, 3]

    conditions:
      - field: computedTier
        operator: in
        value: [1, 2]
        notes: "36-month window"
      - field: computedTier
        operator: eq
        value: 3
        notes: "60-month window"

    formula:
      expression: "windowMonths = (tier in [1,2]) ? 36 : 60"
      variables:
        - name: tier
          source: "rule.RULE-TIER-*.output.computedTier"
          description: "Member's tier determines window size"

    result:
      type: derivation
      output_fields:
        - name: windowMonths
          type: integer
          description: "Number of consecutive months for AMS calculation"

    source_reference:
      document: "RMC"
      section: "§18-409(a)(1-3)"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-TIER-1, RULE-TIER-2, RULE-TIER-3]

    assumptions:
      - id: Q-AMS-01
        description: "How partial months at start/end handled is not in RMC. Assume complete months only."
        impact: "Could affect which months are included in the window"
        status: OPEN

    test_cases:
      - id: TC-AMS-WIN-01
        description: "Tier 1 — 36-month window"
        type: happy_path
        inputs: { computedTier: 1 }
        expected: { windowMonths: 36 }
      - id: TC-AMS-WIN-02
        description: "Tier 2 — 36-month window"
        type: happy_path
        inputs: { computedTier: 2 }
        expected: { windowMonths: 36 }
      - id: TC-AMS-WIN-03
        description: "Tier 3 — 60-month window"
        type: happy_path
        inputs: { computedTier: 3 }
        expected: { windowMonths: 60 }
      - id: TC-AMS-WIN-04
        description: "Negative — invalid tier"
        type: negative
        inputs: { computedTier: 4 }
        expected: { error: "Invalid tier" }

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.1"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-AMS-CALC
  # =========================================================================
  - rule_id: RULE-AMS-CALC
    rule_name: "AMS Calculation Method"
    category: benefit_calculation
    description: >
      For each possible consecutive window of N months, sum all pensionable
      compensation and divide by N. The highest resulting average is the AMS.
      NOTE: AMS is computed by the Connector Service. The Intelligence
      Service trusts the Connector value but includes the trace.
    tier_applicability: [1, 2, 3]

    formula:
      expression: "AMS = MAX over all windows W of (SUM(compensation[W]) / windowMonths)"
      variables:
        - name: compensation
          source: "connector.getSalaryHistory"
          description: "Monthly pensionable compensation records"
        - name: windowMonths
          source: "rule.RULE-AMS-WINDOW.output.windowMonths"
          description: "36 or 60 depending on tier"

    result:
      type: calculation
      output_fields:
        - name: ams
          type: decimal
          description: "Average Monthly Salary — the highest consecutive-month average"
          format: monetary
        - name: windowStart
          type: date
          description: "Start of the highest window"
        - name: windowEnd
          type: date
          description: "End of the highest window"
        - name: totalCompensation
          type: decimal
          description: "Total compensation in the winning window"
          format: monetary

    source_reference:
      document: "RMC"
      section: "§18-409(a)(1-3)"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-AMS-WINDOW, RULE-LEAVE-PAYOUT]

    assumptions:
      - id: Q-CALC-05
        description: "Unknown if DERP has anti-spiking provisions capping YOY salary increases."
        impact: "Could change AMS if salary spikes are capped"
        status: OPEN

    test_cases:
      - id: TC-AMS-CALC-01
        description: "Martinez — 36-month window with leave payout"
        type: happy_path
        inputs:
          computedTier: 1
          windowMonths: 36
          baseCompensation: "331020.24"
          leavePayoutIncluded: "52000.00"
        expected:
          totalCompensation: "383020.24"
          ams: "10639.45"
        notes: "Case 1: $383,020.24 / 36 = $10,639.4511... → $10,639.45"

      - id: TC-AMS-CALC-02
        description: "Kim — 36-month window, no leave payout boost"
        type: happy_path
        inputs:
          computedTier: 2
          windowMonths: 36
        expected:
          ams: "7347.62"
        notes: "Case 2: AMS from test fixture"

      - id: TC-AMS-CALC-03
        description: "Washington — 60-month window"
        type: happy_path
        inputs:
          computedTier: 3
          windowMonths: 60
          totalCompensation: "401071.20"
        expected:
          ams: "6684.52"
        notes: "Case 3: $401,071.20 / 60 = $6,684.52"

      - id: TC-AMS-CALC-04
        description: "Boundary — verify sliding window finds highest, not most recent"
        type: boundary
        inputs:
          note: "Synthetic member with salary decrease in final year"
        expected:
          windowStart: "not_most_recent"
        notes: "Engine must check ALL possible windows"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.2"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-LEAVE-PAYOUT
  # =========================================================================
  - rule_id: RULE-LEAVE-PAYOUT
    rule_name: "Leave Payout Inclusion"
    category: benefit_calculation
    description: >
      For members hired on or before December 31, 2009: unused sick/vacation
      leave paid out at separation is treated as salary and included in AMS.
      Members hired on or after January 1, 2010: leave payout NOT included.
      NOTE: Cutoff is HIRE DATE, not tier boundary.
    tier_applicability: [1, 2, 3]

    conditions:
      - field: hireDate
        operator: lte
        value: "2009-12-31"
        notes: "Hired before Jan 1, 2010 — eligible for leave payout in AMS"

    formula:
      expression: "Leave payout added to final month compensation before AMS window calculation"
      variables:
        - name: leavePayout
          source: "input.leavePayoutAmount"
          description: "Dollar amount of unused sick/vacation leave payout"
        - name: hireDate
          source: "input.hireDate"
          description: "Used for eligibility check (before/after Jan 1, 2010)"

    result:
      type: derivation
      output_fields:
        - name: leavePayoutEligible
          type: boolean
          description: "Whether member qualifies for leave payout inclusion"
        - name: leavePayoutAmount
          type: decimal
          description: "Amount added to final month's compensation"
          format: monetary

    source_reference:
      document: "RMC"
      section: "§18-402(15)"
      verification: CONFIRMED
      notes: "Hire date cutoff does NOT align with tier boundaries"

    effective_date: "2000-01-01"
    end_date: null
    depends_on: []

    assumptions:
      - id: LEAVE-FINAL-01
        description: "Leave payout is added to the FINAL month's salary before AMS window calc."
        impact: "Dramatically boosts AMS when final month is in the highest window"
        status: ACCEPTED
      - id: LEAVE-TIER-01
        description: >
          Hire date cutoff (Jan 1, 2010) does NOT align with tier boundaries.
          Tier 2 member hired March 2008 IS eligible. Tier 2 member hired
          Feb 2010 is NOT eligible.
        impact: "Must check hire date independently of tier"
        status: ACCEPTED

    test_cases:
      - id: TC-LEAVE-01
        description: "Martinez — hired 1997, eligible"
        type: happy_path
        inputs:
          hireDate: "1997-06-15"
          leavePayoutAmount: "52000.00"
        expected:
          leavePayoutEligible: true
          leavePayoutAmount: "52000.00"
        notes: "Case 1: $52K payout boosts final month AMS"

      - id: TC-LEAVE-02
        description: "Kim — hired March 2008, eligible (before Jan 1, 2010)"
        type: happy_path
        inputs:
          hireDate: "2008-03-01"
          leavePayoutAmount: "15000.00"
        expected:
          leavePayoutEligible: true
        notes: "Case 2: Tier 2 but hired before 2010 cutoff"

      - id: TC-LEAVE-03
        description: "Boundary — hired Dec 31, 2009 = last eligible date"
        type: boundary
        inputs:
          hireDate: "2009-12-31"
        expected:
          leavePayoutEligible: true

      - id: TC-LEAVE-04
        description: "Just over — hired Jan 1, 2010 = not eligible"
        type: just_below
        inputs:
          hireDate: "2010-01-01"
        expected:
          leavePayoutEligible: false

      - id: TC-LEAVE-05
        description: "Washington — hired Sep 2012, not eligible"
        type: negative
        inputs:
          hireDate: "2012-09-01"
        expected:
          leavePayoutEligible: false
        notes: "Case 3: hired after 2010"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.3"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-FURLOUGH
  # =========================================================================
  - rule_id: RULE-FURLOUGH
    rule_name: "Furlough Impact on AMS"
    category: benefit_calculation
    description: >
      If furlough days fall within the AMS window, they reduce pensionable
      salary for those months. Members may purchase furlough days to negate
      this impact.
    tier_applicability: [1, 2, 3]

    conditions:
      - field: derived.hasFurloughInAMSWindow
        operator: eq
        value: true

    result:
      type: derivation
      output_fields:
        - name: furloughImpact
          type: decimal
          description: "Reduction to AMS from furlough days"
          format: monetary
        - name: furloughDaysPurchased
          type: integer
          description: "Number of furlough days member has purchased back"

    source_reference:
      document: "RMC"
      section: "§18-402"
      verification: ASSUMED
      notes: "Mechanism exists but cost formula not fully documented. No demo case exercises this."

    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-AMS-WINDOW]

    assumptions:
      - id: Q-FURLOUGH-01
        description: "Furlough purchase cost formula unknown. Not exercised in POC demo cases."
        impact: "Cannot calculate purchase cost"
        status: OPEN

    test_cases:
      - id: TC-FURLOUGH-01
        description: "No furlough — no impact"
        type: happy_path
        inputs: { hasFurloughInAMSWindow: false }
        expected: { furloughImpact: "0.00" }
      - id: TC-FURLOUGH-02
        description: "Furlough days in window — reduces compensation"
        type: edge_case
        inputs:
          hasFurloughInAMSWindow: true
          furloughDays: 10
          dailyRate: "300.00"
        expected:
          furloughImpact: "3000.00"
      - id: TC-FURLOUGH-03
        description: "Furlough days purchased — impact negated"
        type: boundary
        inputs:
          hasFurloughInAMSWindow: true
          furloughDays: 10
          furloughDaysPurchased: 10
        expected:
          furloughImpact: "0.00"
      - id: TC-FURLOUGH-04
        description: "Negative — furlough outside AMS window"
        type: negative
        inputs: { hasFurloughInAMSWindow: false, furloughDays: 20 }
        expected: { furloughImpact: "0.00" }

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.4"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-BENEFIT-T1
  # =========================================================================
  - rule_id: RULE-BENEFIT-T1
    rule_name: "Tier 1 Benefit Formula"
    category: benefit_calculation
    description: >
      Monthly Benefit = AMS × 2.0% × Total Service Years (earned + purchased).
    tier_applicability: [1]

    conditions:
      - field: computedTier
        operator: eq
        value: 1

    formula:
      expression: "ams * 0.02 * totalServiceForBenefit"
      variables:
        - name: ams
          source: "connector.getAMS"
          description: "Average Monthly Salary from Connector"
        - name: totalServiceForBenefit
          source: "rule.RULE-SVC-PURCHASED.output.totalServiceForBenefit"
          description: "Earned + purchased service years"

    result:
      type: calculation
      output_fields:
        - name: unreducedMonthlyBenefit
          type: decimal
          description: "Monthly benefit before any early retirement reduction"
          format: monetary
        - name: multiplier
          type: decimal
          description: "Always 0.02 for Tier 1"
          format: percentage

    source_reference:
      document: "RMC"
      section: "§18-409(a)(1)"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-AMS-CALC, RULE-SVC-PURCHASED]

    assumptions: []

    test_cases:
      - id: TC-BEN-T1-01
        description: "Martinez — $10,639.45 × 0.02 × 28.75"
        type: happy_path
        inputs:
          ams: "10639.45"
          totalServiceForBenefit: 28.75
        expected:
          unreducedMonthlyBenefit: "6117.68"
          multiplier: "0.02"
        notes: "Case 1: 10639.45 × 0.02 × 28.75 = 6,117.6838 → 6,117.68"

      - id: TC-BEN-T1-02
        description: "Minimum scenario — 5 years service"
        type: boundary
        inputs:
          ams: "5000.00"
          totalServiceForBenefit: 5.00
        expected:
          unreducedMonthlyBenefit: "500.00"
        notes: "5000 × 0.02 × 5 = 500.00"

      - id: TC-BEN-T1-03
        description: "Long service — 35 years"
        type: happy_path
        inputs:
          ams: "12000.00"
          totalServiceForBenefit: 35.00
        expected:
          unreducedMonthlyBenefit: "8400.00"

      - id: TC-BEN-T1-04
        description: "Negative — wrong tier"
        type: negative
        inputs:
          computedTier: 2
          ams: "10000.00"
          totalServiceForBenefit: 20.00
        expected:
          error: "RULE-BENEFIT-T1 does not apply to Tier 2"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.5"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-BENEFIT-T2
  # =========================================================================
  - rule_id: RULE-BENEFIT-T2
    rule_name: "Tier 2 Benefit Formula"
    category: benefit_calculation
    description: >
      Monthly Benefit = AMS × 1.5% × Total Service Years (earned + purchased).
    tier_applicability: [2]

    conditions:
      - field: computedTier
        operator: eq
        value: 2

    formula:
      expression: "ams * 0.015 * totalServiceForBenefit"
      variables:
        - name: ams
          source: "connector.getAMS"
          description: "Average Monthly Salary"
        - name: totalServiceForBenefit
          source: "rule.RULE-SVC-PURCHASED.output.totalServiceForBenefit"
          description: "Earned + purchased service years"

    result:
      type: calculation
      output_fields:
        - name: unreducedMonthlyBenefit
          type: decimal
          format: monetary
        - name: multiplier
          type: decimal
          description: "Always 0.015 for Tier 2"
          format: percentage

    source_reference:
      document: "RMC"
      section: "§18-409(a)(2)"
      verification: CONFIRMED

    effective_date: "2004-09-01"
    end_date: null
    depends_on: [RULE-AMS-CALC, RULE-SVC-PURCHASED]
    assumptions: []

    test_cases:
      - id: TC-BEN-T2-01
        description: "Kim — $7,347.62 × 0.015 × 21.17"
        type: happy_path
        inputs:
          ams: "7347.62"
          totalServiceForBenefit: 21.17
        expected:
          unreducedMonthlyBenefit: "2332.96"
          multiplier: "0.015"
        notes: "Case 2: 7347.62 × 0.015 × 21.17 = 2,332.9627... → 2,332.96"

      - id: TC-BEN-T2-02
        description: "Verify 1.5% multiplier (not 2.0%)"
        type: boundary
        inputs:
          ams: "10000.00"
          totalServiceForBenefit: 20.00
        expected:
          unreducedMonthlyBenefit: "3000.00"
        notes: "10000 × 0.015 × 20 = 3000. With T1 multiplier would be 4000."

      - id: TC-BEN-T2-03
        description: "With purchased service"
        type: happy_path
        inputs:
          ams: "8000.00"
          totalServiceForBenefit: 25.00
          earnedYears: 22.00
          purchasedYears: 3.00
        expected:
          unreducedMonthlyBenefit: "3000.00"
        notes: "Benefit uses TOTAL (earned + purchased)"

      - id: TC-BEN-T2-04
        description: "Negative — wrong tier"
        type: negative
        inputs:
          computedTier: 3
        expected:
          error: "RULE-BENEFIT-T2 does not apply to Tier 3"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.6"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-BENEFIT-T3
  # =========================================================================
  - rule_id: RULE-BENEFIT-T3
    rule_name: "Tier 3 Benefit Formula"
    category: benefit_calculation
    description: >
      Monthly Benefit = AMS × 1.5% × Total Service Years (earned + purchased).
      Same multiplier as Tier 2, but different AMS window (60 months vs 36).
    tier_applicability: [3]

    conditions:
      - field: computedTier
        operator: eq
        value: 3

    formula:
      expression: "ams * 0.015 * totalServiceForBenefit"
      variables:
        - name: ams
          source: "connector.getAMS"
          description: "Average Monthly Salary (60-month window for Tier 3)"
        - name: totalServiceForBenefit
          source: "rule.RULE-SVC-PURCHASED.output.totalServiceForBenefit"

    result:
      type: calculation
      output_fields:
        - name: unreducedMonthlyBenefit
          type: decimal
          format: monetary
        - name: multiplier
          type: decimal
          description: "Always 0.015 for Tier 3"
          format: percentage

    source_reference:
      document: "RMC"
      section: "§18-409(a)(3)"
      verification: CONFIRMED

    effective_date: "2011-07-01"
    end_date: null
    depends_on: [RULE-AMS-CALC, RULE-SVC-PURCHASED]
    assumptions: []

    test_cases:
      - id: TC-BEN-T3-01
        description: "Washington — $6,684.52 × 0.015 × 13.58"
        type: happy_path
        inputs:
          ams: "6684.52"
          totalServiceForBenefit: 13.58
        expected:
          unreducedMonthlyBenefit: "1361.40"
          multiplier: "0.015"
        notes: "Case 3: 6684.52 × 0.015 × 13.58 = 1,361.4045... → 1,361.40"

      - id: TC-BEN-T3-02
        description: "Verify same multiplier as T2 but different AMS result"
        type: boundary
        inputs:
          ams: "6000.00"
          totalServiceForBenefit: 20.00
        expected:
          unreducedMonthlyBenefit: "1800.00"

      - id: TC-BEN-T3-03
        description: "Long service Tier 3"
        type: happy_path
        inputs:
          ams: "8000.00"
          totalServiceForBenefit: 30.00
        expected:
          unreducedMonthlyBenefit: "3600.00"

      - id: TC-BEN-T3-04
        description: "Negative — wrong tier"
        type: negative
        inputs: { computedTier: 1 }
        expected: { error: "RULE-BENEFIT-T3 does not apply to Tier 1" }

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 4.7"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-REDUCTION-APPLY
  # =========================================================================
  - rule_id: RULE-REDUCTION-APPLY
    rule_name: "Early Retirement Reduction Application"
    category: benefit_calculation
    description: >
      If early retirement, multiply unreduced benefit by the reduction factor
      from the statutory table. Reduction is permanent for lifetime.
    tier_applicability: [1, 2, 3]

    conditions:
      - field: derived.retirementType
        operator: eq
        value: "early"

    formula:
      expression: "reducedBenefit = unreducedMonthlyBenefit * reductionFactor"
      variables:
        - name: unreducedMonthlyBenefit
          source: "rule.RULE-BENEFIT-T*.output.unreducedMonthlyBenefit"
          description: "Benefit before reduction"
        - name: reductionFactor
          source: "rule.RULE-EARLY-REDUCE-T*.output.reductionFactor"
          description: "From statutory lookup table"

    result:
      type: calculation
      output_fields:
        - name: reducedMonthlyBenefit
          type: decimal
          description: "Final benefit after early retirement reduction"
          format: monetary
        - name: reductionAmount
          type: decimal
          description: "Dollar amount of reduction"
          format: monetary
        - name: isPermanent
          type: boolean
          description: "Always true — reduction never reverts"

    source_reference:
      document: "RMC"
      section: "§18-409(b)"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null
    depends_on: [RULE-BENEFIT-T1, RULE-BENEFIT-T2, RULE-BENEFIT-T3, RULE-EARLY-REDUCE-T12, RULE-EARLY-REDUCE-T3]
    assumptions: []

    test_cases:
      - id: TC-REDUCE-01
        description: "Kim — $2,332.96 × 0.70 = $1,633.07"
        type: happy_path
        inputs:
          unreducedMonthlyBenefit: "2332.96"
          reductionFactor: "0.70"
        expected:
          reducedMonthlyBenefit: "1633.07"
          reductionAmount: "699.89"
          isPermanent: true
        notes: "Case 2: 2332.96 × 0.70 = 1,633.072 → 1,633.07"

      - id: TC-REDUCE-02
        description: "Washington — $1,361.40 × 0.88 = $1,198.03"
        type: happy_path
        inputs:
          unreducedMonthlyBenefit: "1361.40"
          reductionFactor: "0.88"
        expected:
          reducedMonthlyBenefit: "1198.03"
          reductionAmount: "163.37"
          isPermanent: true
        notes: "Case 3: 1361.40 × 0.88 = 1,198.032 → 1,198.03"

      - id: TC-REDUCE-03
        description: "No reduction — normal/Rule of N"
        type: boundary
        inputs:
          unreducedMonthlyBenefit: "6117.68"
          reductionFactor: "1.00"
        expected:
          reducedMonthlyBenefit: "6117.68"
          reductionAmount: "0.00"
        notes: "Case 1: Martinez — no reduction, factor = 1.00"

      - id: TC-REDUCE-04
        description: "Negative — factor must be between 0.70 and 1.00"
        type: negative
        inputs:
          unreducedMonthlyBenefit: "5000.00"
          reductionFactor: "0.50"
        expected:
          error: "Reduction factor out of range"

    governance:
