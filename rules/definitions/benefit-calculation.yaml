  # =========================================================================
  # RULE-ROUNDING
  # =========================================================================
  - rule_id: RULE-ROUNDING
    rule_name: "Calculation Rounding Strategy"
    category: benefit_calculation
    description: >
      Carry full precision through all intermediate calculations. Round only
      the final monthly benefit amount to cents (2 decimal places). Use
      banker's rounding (round half to even).
    tier_applicability: [1, 2, 3]

    # ASSUMPTION: Q-CALC-01 — Banker's rounding, not confirmed by DERP
    conditions: []

    formula:
      expression: "finalBenefit = bankersRound(calculatedBenefit, 2)"
      variables:
        - name: calculatedBenefit
          source: "rule.RULE-REDUCTION-APPLY.output or RULE-BENEFIT-T*.output"
          description: "Full-precision benefit before rounding"

    result:
      type: derivation
      output_fields:
        - name: roundedBenefit
          type: decimal
          format: monetary
          description: "Final benefit rounded to 2 decimal places"
        - name: roundingMethod
          type: string
          description: "Always 'bankers' (round half to even)"
        - name: precisionLoss
          type: decimal
          description: "Difference between full precision and rounded value"

    source_reference:
      document: "BUILD_HISTORY"
      section: "Decision 21"
      verification: ASSUMED
      notes: "Project decision, NOT confirmed by DERP. DERP may use standard rounding or truncation."

    effective_date: "2026-02-01"
    end_date: null
    depends_on: [RULE-REDUCTION-APPLY]

    assumptions:
      - id: Q-CALC-01
        description: "DERP's actual rounding methodology unknown. Assumed banker's rounding."
        impact: "Penny-level differences on amounts ending in .X50"
        status: OPEN

    test_cases:
      - id: TC-ROUND-01
        description: "Martinez — 6117.6838 → 6117.68"
        type: happy_path
        inputs: { calculatedBenefit: 6117.6838 }
        expected: { roundedBenefit: "6117.68" }

      - id: TC-ROUND-02
        description: "Banker's rounding — .X50 rounds to even (down)"
        type: boundary
        inputs: { calculatedBenefit: 1234.565 }
        expected: { roundedBenefit: "1234.56" }
        notes: "6 is even → round down"

      - id: TC-ROUND-03
        description: "Banker's rounding — .X50 rounds to even (up)"
        type: boundary
        inputs: { calculatedBenefit: 1234.575 }
        expected: { roundedBenefit: "1234.58" }
        notes: "7 is odd → round up to 8 (even)"

      - id: TC-ROUND-04
        description: "No rounding needed"
        type: happy_path
        inputs: { calculatedBenefit: 5000.00 }
        expected: { roundedBenefit: "5000.00", precisionLoss: "0.00" }

