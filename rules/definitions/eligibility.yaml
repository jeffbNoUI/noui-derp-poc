# ===========================================================================
# NoUI DERP POC — Eligibility Determination Rules
# ===========================================================================
# Category 3: Eligibility rules gate benefit calculation and determine
# whether reductions apply. Evaluated in strict hierarchy.
# Evaluation order: 3
# ===========================================================================

file_metadata:
  category: eligibility
  description: "Vesting, retirement type determination, reduction factors, and evaluation hierarchy."
  evaluation_order: 3
  rule_count: 10
  governing_authority: "RMC §18-391 through §18-430.7"
  schema_version: "1.0"

# ===========================================================================
rules:

  # =========================================================================
  # RULE-VESTING
  # =========================================================================
  - rule_id: RULE-VESTING
    rule_name: "Vesting Requirement"
    category: eligibility
    description: >
      A member must have at least 5 years of earned service credit to be
      vested and eligible for any retirement benefit. Purchased service is
      excluded from vesting count per RMC §18-415(a).
    tier_applicability: [1, 2, 3]

    conditions:
      - field: serviceCredit.totalForEligibility
        operator: gte
        value: 5.0
        notes: "Earned service only — purchased excluded per RULE-SVC-PURCHASED"

    result:
      type: determination
      output_fields:
        - name: isVested
          type: boolean
          description: "Whether member meets vesting requirement"
        - name: vestedDate
          type: date
          description: "Date vesting was achieved (hire date + 5 years)"

    source_reference:
      document: "RMC"
      section: "§18-402(31)"
      verification: CONFIRMED
      notes: "Post-1987 members: 5 years. Pre-1987: 10 years (not in POC scope)."

    effective_date: "1987-01-01"
    end_date: null

    depends_on:
      - RULE-SVC-EARNED
      - RULE-SVC-PURCHASED

    assumptions:
      - id: VEST-ERA-01
        description: "All POC synthetic members are post-1987, so 5-year vesting applies."
        impact: "Pre-1987 members would need 10-year vesting check"
        status: ACCEPTED
      - id: VEST-PURCHASED-01
        description: "Vesting uses earned service only. Confirmed by §18-415(a)."
        impact: "None — confirmed"
        status: ACCEPTED

    test_cases:
      - id: TC-VEST-01
        description: "Martinez — 28.75 years, clearly vested"
        type: happy_path
        inputs:
          totalForEligibility: 28.75
        expected:
          isVested: true

      - id: TC-VEST-02
        description: "Boundary — exactly 5.00 years"
        type: boundary
        inputs:
          totalForEligibility: 5.00
        expected:
          isVested: true

      - id: TC-VEST-03
        description: "Just below — 4.92 years (59 months)"
        type: just_below
        inputs:
          totalForEligibility: 4.92
        expected:
          isVested: false

      - id: TC-VEST-04
        description: "Negative — purchased service should not count"
        type: negative
        inputs:
          earnedServiceYears: 3.00
          purchasedServiceYears: 5.00
          totalForEligibility: 3.00
        expected:
          isVested: false
        notes: "Member has 8 total years but only 3 earned — NOT vested"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.1"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-NORMAL-RET
  # =========================================================================
  - rule_id: RULE-NORMAL-RET
    rule_name: "Normal Retirement Eligibility"
    category: eligibility
    description: >
      Age 65 or older AND at least 5 years of earned service credit =
      normal retirement. Full unreduced benefit. Applies to all tiers.
    tier_applicability: [1, 2, 3]

    conditions:
      - field: ageAtRetirement
        operator: gte
        value: 65
        join: AND
      - field: serviceCredit.totalForEligibility
        operator: gte
        value: 5.0
        join: AND

    result:
      type: determination
      output_fields:
        - name: retirementType
          type: enum
          description: "Value: 'normal'"
        - name: reductionFactor
          type: decimal
          description: "Always 1.00 for normal retirement"

    source_reference:
      document: "RMC"
      section: "§18-402(20), §18-408"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null

    depends_on:
      - RULE-VESTING

    assumptions: []

    test_cases:
      - id: TC-NORMAL-01
        description: "Age 65 with 30 years service"
        type: happy_path
        inputs:
          ageAtRetirement: 65
          totalForEligibility: 30.00
        expected:
          retirementType: "normal"
          reductionFactor: "1.00"

      - id: TC-NORMAL-02
        description: "Boundary — exactly age 65 with exactly 5 years"
        type: boundary
        inputs:
          ageAtRetirement: 65
          totalForEligibility: 5.00
        expected:
          retirementType: "normal"
          reductionFactor: "1.00"

      - id: TC-NORMAL-03
        description: "Just below — age 64 with 30 years"
        type: just_below
        inputs:
          ageAtRetirement: 64
          totalForEligibility: 30.00
        expected:
          retirementType: null
        notes: "Does not meet normal retirement — may qualify via Rule of 75/85"

      - id: TC-NORMAL-04
        description: "Negative — age 65 but only 4 years service"
        type: negative
        inputs:
          ageAtRetirement: 65
          totalForEligibility: 4.00
        expected:
          retirementType: null
          isVested: false
        notes: "Not vested — cannot retire"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.2"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-RULE-OF-75
  # =========================================================================
  - rule_id: RULE-RULE-OF-75
    rule_name: "Rule of 75 Eligibility"
    category: eligibility
    description: >
      For Tiers 1 and 2: if age + earned service credit >= 75 AND member
      has attained minimum age 55, member qualifies for unreduced benefit.
      Purchased service excluded. Must be attained while actively employed.
    tier_applicability: [1, 2]

    conditions:
      - field: computedTier
        operator: in
        value: [1, 2]
        join: AND
      - field: ageAtRetirement
        operator: gte
        value: 55
        join: AND
        notes: "Minimum age requirement"
      - field: derived.agePlusEarnedService
        operator: gte
        value: 75.0
        join: AND
        notes: "Sum uses earned service only — purchased excluded"

    result:
      type: determination
      output_fields:
        - name: retirementType
          type: enum
          description: "Value: 'rule_of_75'"
        - name: ruleSum
          type: decimal
          description: "Age + earned service"
        - name: reductionFactor
          type: decimal
          description: "Always 1.00 — unreduced"
        - name: minimumAgeMet
          type: boolean
          description: "Whether age >= 55"

    source_reference:
      document: "RMC"
      section: "§18-402(20)"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null

    depends_on:
      - RULE-VESTING
      - RULE-SVC-PURCHASED

    assumptions:
      - id: Q-CALC-02-IMPACT
        description: >
          The age + service sum depends on how partial years are calculated.
          Year-month vs exact day could change whether a member is 0.01
          above or below 75.
        impact: "Could flip eligibility determination at boundary"
        status: OPEN

    test_cases:
      - id: TC-R75-01
        description: "Martinez — meets Rule of 75"
        type: happy_path
        inputs:
          computedTier: 1
          ageAtRetirement: 63
          totalForEligibility: 28.75
        expected:
          retirementType: "rule_of_75"
          ruleSum: 91.75
          minimumAgeMet: true
          reductionFactor: "1.00"
        notes: "Case 1: 63 + 28.75 = 91.75 >= 75 ✓"

      - id: TC-R75-02
        description: "Exact boundary — sum = 75.00"
        type: boundary
        inputs:
          computedTier: 1
          ageAtRetirement: 55
          totalForEligibility: 20.00
        expected:
          retirementType: "rule_of_75"
          ruleSum: 75.00
          minimumAgeMet: true

      - id: TC-R75-03
        description: "Just below — sum = 74.99"
        type: just_below
        inputs:
          computedTier: 1
          ageAtRetirement: 55
          totalForEligibility: 19.99
        expected:
          retirementType: null
          ruleSum: 74.99
        notes: "Does NOT meet Rule of 75"

      - id: TC-R75-04
        description: "Kim — does not meet Rule of 75"
        type: negative
        inputs:
          computedTier: 2
          ageAtRetirement: 55
          totalForEligibility: 18.17
        expected:
          retirementType: null
          ruleSum: 73.17
        notes: "Case 2: 55 + 18.17 = 73.17 < 75 ✗"

      - id: TC-R75-05
        description: "Meets sum but not minimum age"
        type: edge_case
        inputs:
          computedTier: 1
          ageAtRetirement: 54
          totalForEligibility: 21.00
        expected:
          retirementType: null
          ruleSum: 75.00
          minimumAgeMet: false
          deferredUntilAge: 55
        notes: "Sum >= 75 but age < 55 — must wait"

      - id: TC-R75-06
        description: "Tier 3 member — Rule of 75 does not apply"
        type: negative
        inputs:
          computedTier: 3
          ageAtRetirement: 60
          totalForEligibility: 20.00
        expected:
          retirementType: null
        notes: "Tier 3 uses Rule of 85, not Rule of 75"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.3"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-RULE-OF-85
  # =========================================================================
  - rule_id: RULE-RULE-OF-85
    rule_name: "Rule of 85 Eligibility"
    category: eligibility
    description: >
      For Tier 3: if age + earned service credit >= 85 AND member has
      attained minimum age 60, member qualifies for unreduced benefit.
      Purchased service excluded.
    tier_applicability: [3]

    conditions:
      - field: computedTier
        operator: eq
        value: 3
        join: AND
      - field: ageAtRetirement
        operator: gte
        value: 60
        join: AND
      - field: derived.agePlusEarnedService
        operator: gte
        value: 85.0
        join: AND

    result:
      type: determination
      output_fields:
        - name: retirementType
          type: enum
          description: "Value: 'rule_of_85'"
        - name: ruleSum
          type: decimal
          description: "Age + earned service"
        - name: reductionFactor
          type: decimal
          description: "Always 1.00 — unreduced"
        - name: minimumAgeMet
          type: boolean

    source_reference:
      document: "RMC"
      section: "§18-402(20)"
      verification: CONFIRMED

    effective_date: "2011-07-01"
    end_date: null

    depends_on:
      - RULE-VESTING
      - RULE-SVC-PURCHASED

    assumptions:
      - id: R85-PARTIAL-01
        description: "Same partial-year calculation dependency as Rule of 75."
        impact: "Could flip eligibility at boundary"
        status: OPEN

    test_cases:
      - id: TC-R85-01
        description: "Washington — does NOT meet Rule of 85"
        type: happy_path
        inputs:
          computedTier: 3
          ageAtRetirement: 63
          totalForEligibility: 13.58
        expected:
          retirementType: null
          ruleSum: 76.58
        notes: "Case 3: 63 + 13.58 = 76.58 < 85 ✗"

      - id: TC-R85-02
        description: "Boundary — exactly 85.00"
        type: boundary
        inputs:
          computedTier: 3
          ageAtRetirement: 60
          totalForEligibility: 25.00
        expected:
          retirementType: "rule_of_85"
          ruleSum: 85.00

      - id: TC-R85-03
        description: "Just below — 84.99"
        type: just_below
        inputs:
          computedTier: 3
          ageAtRetirement: 60
          totalForEligibility: 24.99
        expected:
          retirementType: null
          ruleSum: 84.99

      - id: TC-R85-04
        description: "Meets sum but under minimum age"
        type: edge_case
        inputs:
          computedTier: 3
          ageAtRetirement: 59
          totalForEligibility: 26.00
        expected:
          retirementType: null
          ruleSum: 85.00
          minimumAgeMet: false
          deferredUntilAge: 60

      - id: TC-R85-05
        description: "Tier 1 member — Rule of 85 does not apply"
        type: negative
        inputs:
          computedTier: 1
          ageAtRetirement: 60
          totalForEligibility: 25.00
        expected:
          retirementType: null
        notes: "Tier 1 uses Rule of 75, not Rule of 85"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.4"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-EARLY-RET-T12
  # =========================================================================
  - rule_id: RULE-EARLY-RET-T12
    rule_name: "Early Retirement Eligibility (Tiers 1 & 2)"
    category: eligibility
    description: >
      Age 55 or older AND at least 5 years of earned service AND does not
      meet normal retirement or Rule of 75. Benefit is reduced.
    tier_applicability: [1, 2]

    conditions:
      - field: computedTier
        operator: in
        value: [1, 2]
        join: AND
      - field: ageAtRetirement
        operator: gte
        value: 55
        join: AND
      - field: serviceCredit.totalForEligibility
        operator: gte
        value: 5.0
        join: AND
      - field: derived.meetsNormalOrRuleOfN
        operator: eq
        value: false
        join: AND
        notes: "Only applies if normal/Rule of 75 not met"

    result:
      type: determination
      output_fields:
        - name: retirementType
          type: enum
          description: "Value: 'early'"
        - name: requiresReduction
          type: boolean
          description: "Always true for early retirement"

    source_reference:
      document: "RMC"
      section: "§18-408, §18-409(b)"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null

    depends_on:
      - RULE-VESTING
      - RULE-NORMAL-RET
      - RULE-RULE-OF-75

    assumptions: []

    test_cases:
      - id: TC-EARLY-T12-01
        description: "Kim — age 55, Tier 2, does not meet Rule of 75"
        type: happy_path
        inputs:
          computedTier: 2
          ageAtRetirement: 55
          totalForEligibility: 18.17
          meetsNormalOrRuleOfN: false
        expected:
          retirementType: "early"
          requiresReduction: true
        notes: "Case 2: Jennifer Kim"

      - id: TC-EARLY-T12-02
        description: "Boundary — exactly age 55 with 5 years"
        type: boundary
        inputs:
          computedTier: 1
          ageAtRetirement: 55
          totalForEligibility: 5.00
          meetsNormalOrRuleOfN: false
        expected:
          retirementType: "early"
          requiresReduction: true

      - id: TC-EARLY-T12-03
        description: "Just below — age 54"
        type: just_below
        inputs:
          computedTier: 1
          ageAtRetirement: 54
          totalForEligibility: 10.00
          meetsNormalOrRuleOfN: false
        expected:
          retirementType: null
        notes: "Under minimum age 55"

      - id: TC-EARLY-T12-04
        description: "Negative — meets Rule of 75, so not early"
        type: negative
        inputs:
          computedTier: 1
          ageAtRetirement: 63
          totalForEligibility: 28.75
          meetsNormalOrRuleOfN: true
        expected:
          retirementType: null
        notes: "Martinez qualifies for Rule of 75, not early"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.5"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-EARLY-RET-T3
  # =========================================================================
  - rule_id: RULE-EARLY-RET-T3
    rule_name: "Early Retirement Eligibility (Tier 3)"
    category: eligibility
    description: >
      Age 60 or older AND at least 5 years of earned service AND does not
      meet normal retirement or Rule of 85. Benefit is reduced.
    tier_applicability: [3]

    conditions:
      - field: computedTier
        operator: eq
        value: 3
        join: AND
      - field: ageAtRetirement
        operator: gte
        value: 60
        join: AND
      - field: serviceCredit.totalForEligibility
        operator: gte
        value: 5.0
        join: AND
      - field: derived.meetsNormalOrRuleOfN
        operator: eq
        value: false
        join: AND

    result:
      type: determination
      output_fields:
        - name: retirementType
          type: enum
          description: "Value: 'early'"
        - name: requiresReduction
          type: boolean
          description: "Always true"

    source_reference:
      document: "RMC"
      section: "§18-408, §18-409(b)"
      verification: CONFIRMED

    effective_date: "2011-07-01"
    end_date: null

    depends_on:
      - RULE-VESTING
      - RULE-NORMAL-RET
      - RULE-RULE-OF-85

    assumptions: []

    test_cases:
      - id: TC-EARLY-T3-01
        description: "Washington — age 63, Tier 3, does not meet Rule of 85"
        type: happy_path
        inputs:
          computedTier: 3
          ageAtRetirement: 63
          totalForEligibility: 13.58
          meetsNormalOrRuleOfN: false
        expected:
          retirementType: "early"
          requiresReduction: true
        notes: "Case 3: David Washington"

      - id: TC-EARLY-T3-02
        description: "Boundary — exactly age 60 with 5 years"
        type: boundary
        inputs:
          computedTier: 3
          ageAtRetirement: 60
          totalForEligibility: 5.00
          meetsNormalOrRuleOfN: false
        expected:
          retirementType: "early"

      - id: TC-EARLY-T3-03
        description: "Just below — age 59"
        type: just_below
        inputs:
          computedTier: 3
          ageAtRetirement: 59
          totalForEligibility: 10.00
          meetsNormalOrRuleOfN: false
        expected:
          retirementType: null
        notes: "Under minimum age 60 for Tier 3"

      - id: TC-EARLY-T3-04
        description: "Negative — Tier 3 member who meets Rule of 85"
        type: negative
        inputs:
          computedTier: 3
          ageAtRetirement: 62
          totalForEligibility: 25.00
          meetsNormalOrRuleOfN: true
        expected:
          retirementType: null
        notes: "62 + 25 = 87 >= 85 — qualifies for Rule of 85, not early"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.6"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-EARLY-REDUCE-T12: Early Retirement Reduction (Tiers 1 & 2)
  # =========================================================================
  - rule_id: RULE-EARLY-REDUCE-T12
    rule_name: "Early Retirement Reduction (Tiers 1 & 2)"
    category: eligibility
    description: >
      Benefit reduced by 3% per year under age 65. Maximum reduction 30%
      at age 55. Reduction is permanent. Uses statutory lookup table by
      integer age — no monthly proration.
    tier_applicability: [1, 2]

    # CRITICAL: Use statutory lookup table, NOT years_under_65 × rate
    # Per CRITICAL-001 resolution and SESSION_BRIEF instructions
    lookup_table:
      source: "RMC §18-409(b)"
      description: "Tier 1 & 2 early retirement benefit factor by integer age"
      entries:
        "55": "0.70"
        "56": "0.73"
        "57": "0.76"
        "58": "0.79"
        "59": "0.82"
        "60": "0.85"
        "61": "0.88"
        "62": "0.91"
        "63": "0.94"
        "64": "0.97"
        "65": "1.00"

    conditions:
      - field: derived.retirementType
        operator: eq
        value: "early"
        join: AND
      - field: computedTier
        operator: in
        value: [1, 2]
        join: AND

    formula:
      expression: "lookup(integerAge) from early_retirement_table_t12"
      variables:
        - name: integerAge
          source: "derived.completedYearsOfAge"
          description: "Member's age in completed years (floor of age)"

    result:
      type: derivation
      output_fields:
        - name: reductionFactor
          type: decimal
          description: "Benefit multiplier (e.g., 0.70 = 30% reduction)"
          format: percentage
        - name: reductionPercent
          type: integer
          description: "Percentage reduction (e.g., 30)"
        - name: yearsUnder65
          type: integer
          description: "Completed years under age 65"

    source_reference:
      document: "RMC"
      section: "§18-409(b)"
      verification: CONFIRMED
      notes: "Statutory table. CRITICAL-001 confirmed: 3% per year for Tiers 1&2."

    effective_date: "2000-01-01"
    end_date: null

    depends_on:
      - RULE-EARLY-RET-T12

    assumptions:
      - id: Q-CALC-03
        description: >
          Integer-age approach confirmed by statutory table listing integer
          ages only. DERP staff confirmation would eliminate any ambiguity
          about whether monthly proration occurs.
        impact: "Could change reduction by up to ~2.9%"
        status: OPEN

    test_cases:
      - id: TC-REDUCE-T12-01
        description: "Kim — age 55, maximum reduction 30%"
        type: happy_path
        inputs:
          computedTier: 2
          integerAge: 55
          retirementType: "early"
        expected:
          reductionFactor: "0.70"
          reductionPercent: 30
          yearsUnder65: 10
        notes: "Case 2: Jennifer Kim"

      - id: TC-REDUCE-T12-02
        description: "Age 64 — minimum reduction 3%"
        type: boundary
        inputs:
          computedTier: 1
          integerAge: 64
          retirementType: "early"
        expected:
          reductionFactor: "0.97"
          reductionPercent: 3
          yearsUnder65: 1

      - id: TC-REDUCE-T12-03
        description: "Age 60 — mid-range 15% reduction"
        type: happy_path
        inputs:
          computedTier: 1
          integerAge: 60
          retirementType: "early"
        expected:
          reductionFactor: "0.85"
          reductionPercent: 15
          yearsUnder65: 5

      - id: TC-REDUCE-T12-04
        description: "Age 65 — no reduction (not early retirement)"
        type: negative
        inputs:
          computedTier: 1
          integerAge: 65
          retirementType: "normal"
        expected:
          reductionFactor: "1.00"
          reductionPercent: 0

      - id: TC-REDUCE-T12-05
        description: "Verify all table entries"
        type: boundary
        inputs:
          computedTier: 1
          retirementType: "early"
        expected:
          table_verification:
            55: "0.70"
            56: "0.73"
            57: "0.76"
            58: "0.79"
            59: "0.82"
            60: "0.85"
            61: "0.88"
            62: "0.91"
            63: "0.94"
            64: "0.97"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.7"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition. CRITICAL-001 confirmed 3% rate."
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-EARLY-REDUCE-T3: Early Retirement Reduction (Tier 3)
  # =========================================================================
  - rule_id: RULE-EARLY-REDUCE-T3
    rule_name: "Early Retirement Reduction (Tier 3)"
    category: eligibility
    description: >
      Benefit reduced by 6% per year under age 65. Maximum reduction 30%
      at age 60. Reduction is permanent. Uses statutory lookup table.
    tier_applicability: [3]

    lookup_table:
      source: "RMC §18-409(b)"
      description: "Tier 3 early retirement benefit factor by integer age"
      entries:
        "60": "0.70"
        "61": "0.76"
        "62": "0.82"
        "63": "0.88"
        "64": "0.94"
        "65": "1.00"

    conditions:
      - field: derived.retirementType
        operator: eq
        value: "early"
        join: AND
      - field: computedTier
        operator: eq
        value: 3
        join: AND

    formula:
      expression: "lookup(integerAge) from early_retirement_table_t3"
      variables:
        - name: integerAge
          source: "derived.completedYearsOfAge"
          description: "Member's age in completed years"

    result:
      type: derivation
      output_fields:
        - name: reductionFactor
          type: decimal
          description: "Benefit multiplier"
          format: percentage
        - name: reductionPercent
          type: integer
        - name: yearsUnder65
          type: integer

    source_reference:
      document: "RMC"
      section: "§18-409(b)"
      verification: CONFIRMED
      notes: "CRITICAL-001 confirmed: 6% per year for Tier 3."

    effective_date: "2011-07-01"
    end_date: null

    depends_on:
      - RULE-EARLY-RET-T3

    assumptions:
      - id: Q-CALC-03
        description: "Same integer-age assumption as T12."
        impact: "Could change reduction by up to ~5.9%"
        status: OPEN

    test_cases:
      - id: TC-REDUCE-T3-01
        description: "Washington — age 63, 12% reduction"
        type: happy_path
        inputs:
          computedTier: 3
          integerAge: 63
          retirementType: "early"
        expected:
          reductionFactor: "0.88"
          reductionPercent: 12
          yearsUnder65: 2
        notes: "Case 3: David Washington"

      - id: TC-REDUCE-T3-02
        description: "Age 60 — maximum reduction 30%"
        type: boundary
        inputs:
          computedTier: 3
          integerAge: 60
          retirementType: "early"
        expected:
          reductionFactor: "0.70"
          reductionPercent: 30
          yearsUnder65: 5

      - id: TC-REDUCE-T3-03
        description: "Age 64 — minimum reduction 6%"
        type: boundary
        inputs:
          computedTier: 3
          integerAge: 64
          retirementType: "early"
        expected:
          reductionFactor: "0.94"
          reductionPercent: 6
          yearsUnder65: 1

      - id: TC-REDUCE-T3-04
        description: "Verify all table entries"
        type: boundary
        inputs:
          computedTier: 3
          retirementType: "early"
        expected:
          table_verification:
            60: "0.70"
            61: "0.76"
            62: "0.82"
            63: "0.88"
            64: "0.94"

      - id: TC-REDUCE-T3-05
        description: "Negative — Tier 1 member should not use T3 table"
        type: negative
        inputs:
          computedTier: 1
          integerAge: 60
          retirementType: "early"
        expected:
          reductionFactor: "0.85"
        notes: "Tier 1 uses T12 table (3% rate), not T3 table (6% rate)"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.8"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition. CRITICAL-001 confirmed 6% rate."
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-DEFERRED
  # =========================================================================
  - rule_id: RULE-DEFERRED
    rule_name: "Deferred Retirement"
    category: eligibility
    description: >
      Vested member who terminates employment before reaching any retirement
      eligibility. Benefits calculated based on service and salary at
      termination. Must wait until reaching eligibility age. Also triggered
      if 30-day application deadline is missed.
    tier_applicability: [1, 2, 3]

    conditions:
      - field: derived.isVested
        operator: eq
        value: true
        join: AND
      - field: derived.meetsAnyRetirementEligibility
        operator: eq
        value: false
        join: AND

    result:
      type: determination
      output_fields:
        - name: retirementType
          type: enum
          description: "Value: 'deferred'"
        - name: earliestPaymentDate
          type: date
          description: "Date member can begin receiving benefits"
        - name: reason
          type: string
          description: "'below_eligibility_age' or 'missed_application_deadline'"

    source_reference:
      document: "RMC"
      section: "§18-402(10), §18-408"
      verification: CONFIRMED

    effective_date: "2000-01-01"
    end_date: null

    depends_on:
      - RULE-VESTING
      - RULE-NORMAL-RET
      - RULE-RULE-OF-75
      - RULE-RULE-OF-85
      - RULE-EARLY-RET-T12
      - RULE-EARLY-RET-T3

    assumptions:
      - id: DEFER-AUTO-01
        description: "Missing 30-day deadline = automatic deferred. No appeal in statute."
        impact: "Critical — affects member's retirement timing"
        status: ACCEPTED

    test_cases:
      - id: TC-DEFER-01
        description: "Vested member age 50 terminates — deferred"
        type: happy_path
        inputs:
          isVested: true
          computedTier: 1
          ageAtRetirement: 50
          meetsAnyRetirementEligibility: false
        expected:
          retirementType: "deferred"
          reason: "below_eligibility_age"

      - id: TC-DEFER-02
        description: "Missed 30-day deadline — forced deferred"
        type: edge_case
        inputs:
          isVested: true
          computedTier: 2
          ageAtRetirement: 58
          applicationDeadlineMissed: true
        expected:
          retirementType: "deferred"
          reason: "missed_application_deadline"

      - id: TC-DEFER-03
        description: "Boundary — Tier 3 member age 59 (one year below min)"
        type: just_below
        inputs:
          isVested: true
          computedTier: 3
          ageAtRetirement: 59
          meetsAnyRetirementEligibility: false
        expected:
          retirementType: "deferred"

      - id: TC-DEFER-04
        description: "Negative — not vested = no deferred, just refund"
        type: negative
        inputs:
          isVested: false
          ageAtRetirement: 45
        expected:
          retirementType: null
          refundEligible: true
        notes: "Non-vested member gets contribution refund, not deferred status"

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.9"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"

  # =========================================================================
  # RULE-ELIG-HIERARCHY
  # =========================================================================
  - rule_id: RULE-ELIG-HIERARCHY
    rule_name: "Eligibility Evaluation Order"
    category: eligibility
    description: >
      Eligibility is evaluated in strict order: (1) Tier determination,
      (2) Age at retirement, (3) Service credit separation, (4) Vesting
      check, (5) Normal retirement, (6) Rule of 75/85, (7) Early
      retirement, (8) Deferred if none met. First qualifying category
      applies.
    tier_applicability: [1, 2, 3]

    # This is a meta-rule defining evaluation order, not a calculation.
    conditions: []

    result:
      type: routing
      output_fields:
        - name: evaluationOrder
          type: list
          description: "Ordered list of rule IDs to evaluate"
        - name: finalRetirementType
          type: enum
          description: "The first qualifying type: normal, rule_of_75, rule_of_85, early, deferred"
        - name: reductionApplies
          type: boolean
          description: "Whether early retirement reduction applies"

    source_reference:
      document: "RMC"
      section: "Derived from §18-408, §18-409 structure"
      verification: CONFIRMED
      notes: "Evaluation order is architectural decision documented in process definition"

    effective_date: "2000-01-01"
    end_date: null

    depends_on: []

    assumptions:
      - id: HIER-NORMAL-01
        description: >
          A member who qualifies for both normal retirement (age 65+) and
          Rule of 75 should be classified as normal retirement. The benefit
          amount is identical — hierarchy prevents double-classification.
        impact: "Classification label only — no benefit difference"
        status: ACCEPTED

    test_cases:
      - id: TC-HIER-01
        description: "Martinez — Rule of 75 (normal not met, age < 65)"
        type: happy_path
        inputs:
          computedTier: 1
          ageAtRetirement: 63
          totalForEligibility: 28.75
          agePlusService: 91.75
        expected:
          finalRetirementType: "rule_of_75"
          reductionApplies: false

      - id: TC-HIER-02
        description: "Kim — early retirement (Rule of 75 not met)"
        type: happy_path
        inputs:
          computedTier: 2
          ageAtRetirement: 55
          totalForEligibility: 18.17
          agePlusService: 73.17
        expected:
          finalRetirementType: "early"
          reductionApplies: true

      - id: TC-HIER-03
        description: "Washington — early retirement (Rule of 85 not met)"
        type: happy_path
        inputs:
          computedTier: 3
          ageAtRetirement: 63
          totalForEligibility: 13.58
          agePlusService: 76.58
        expected:
          finalRetirementType: "early"
          reductionApplies: true

      - id: TC-HIER-04
        description: "Member who meets both normal and Rule of 75 = normal"
        type: edge_case
        inputs:
          computedTier: 1
          ageAtRetirement: 67
          totalForEligibility: 30.00
          agePlusService: 97.00
        expected:
          finalRetirementType: "normal"
          reductionApplies: false
        notes: "Normal takes precedence in hierarchy"

      - id: TC-HIER-05
        description: "Non-vested member — no retirement type"
        type: negative
        inputs:
          computedTier: 2
          ageAtRetirement: 40
          totalForEligibility: 3.00
        expected:
          finalRetirementType: null
          refundEligible: true

    governance:
      version: "1.0.0"
      last_updated: "2026-02-24"
      certified_by: PENDING
      certified_date: null
      inventory_ref: "Section 3.10"
      change_history:
        - date: "2026-02-24"
          description: "Initial rule definition"
          author: "S2 Rules Engine Session"
